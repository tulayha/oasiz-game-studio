<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (Optional, keeping it transparent for utility) -->
  
  <!-- Horse -->
  <g id="horse" transform="translate(100, 250)">
    <!-- Body -->
    <path d="M 0,0 Q 50,-60 150,-40 Q 200,-20 220,20 L 220,60 Q 180,80 100,70 L 20,70 Q -20,60 0,0" fill="#f0f0f0" stroke="#cccccc" stroke-width="2" />
    <!-- Tail -->
    <path d="M 0,10 Q -40,10 -30,60 Q -20,80 -10,40" fill="#e0e0e0" stroke="#cccccc" stroke-width="1" />
    <!-- Legs -->
    <path d="M 30,70 L 20,110 M 60,70 L 55,110 M 160,65 L 170,110 M 190,60 L 200,105" stroke="#cccccc" stroke-width="4" stroke-linecap="round" fill="none" />
    <!-- Head and Neck -->
    <path d="M 150,-40 Q 170,-100 230,-90 Q 250,-80 240,-50 L 210,-30" fill="#f0f0f0" stroke="#cccccc" stroke-width="2" />
    <circle cx="230" cy="-75" r="3" fill="#333" /> <!-- Eye -->
    <!-- Harness -->
    <path d="M 230,-90 L 245,-75 M 240,-50 L 220,-60" stroke="#5c4033" stroke-width="1.5" fill="none" />
  </g>

  <!-- Archer -->
  <g id="archer" transform="translate(180, 210)">
    <!-- Body/Outfit -->
    <path d="M -20,0 L 20,0 L 30,80 L -30,80 Z" fill="#8b4513" stroke="#5c4033" stroke-width="2" />
    <path d="M -20,0 Q 0,-10 20,0" fill="#dcdcdc" /> <!-- Fur collar -->
    
    <!-- Hat -->
    <path d="M -15,-10 L 15,-10 L 10,-30 Q 0,-40 -10,-30 Z" fill="#8b4513" stroke="#5c4033" stroke-width="1" />
    <path d="M -15,-10 L 15,-10 L 15,-5 L -15,-5 Z" fill="#dcdcdc" /> <!-- Hat fur -->
    <circle cx="0" cy="-35" r="4" fill="#333" /> <!-- Hat tassel/top -->

    <!-- Arms and Bow (Targeting 45 degrees top-right) -->
    <g id="aiming" transform="rotate(-45, 10, 0)">
        <!-- Left Arm (Holding Bow) -->
        <path d="M 0,10 L 60,10" stroke="#8b4513" stroke-width="8" stroke-linecap="round" fill="none" />
        <path d="M 50,10 L 60,10" stroke="#dcdcdc" stroke-width="10" stroke-linecap="round" fill="none" /> <!-- Fur cuff -->

        <!-- Bow (Recurve Style) -->
        <path d="M 60,-50 Q 30,0 60,50 Q 80,70 100,60 M 60,-50 Q 80,-70 100,-60" fill="none" stroke="#a0522d" stroke-width="3" stroke-linecap="round" />
        <path d="M 98,-60 L 98,60" stroke="#ffffff" stroke-width="1" opacity="0.6" /> <!-- Bowstring -->

        <!-- Right Arm (Drawing String) -->
        <path d="M -10,15 L -20,30 L 0,15" stroke="#8b4513" stroke-width="8" stroke-linecap="round" fill="none" />
        
        <!-- Arrow -->
        <path d="M -10,10 L 100,10" stroke="#333" stroke-width="1.5" />
        <path d="M 100,10 L 90,7 M 100,10 L 90,13" stroke="#333" stroke-width="1.5" /> <!-- Arrowhead -->
    </g>
  </g>
</svg>
