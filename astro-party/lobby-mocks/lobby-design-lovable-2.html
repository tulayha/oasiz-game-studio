<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Party Lobby — Cosmic Command</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --c1:#00e5ff;--c2:#ff2d9b;--c3:#ffe500;--c4:#00ff88;
  --bg:#080c18;--surface:#0f1528;--surface2:#161e36;
  --border:#253050;--text:#e0e8f8;--text-dim:#6878a0;
  --font-head:'Orbitron',sans-serif;--font-body:'Exo 2',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:#040810;font-family:var(--font-body)}
#scale-wrapper{position:absolute;width:1280px;height:720px;transform-origin:top left;overflow:hidden}
.lobby{width:100%;height:100%;background:var(--bg);position:relative;display:grid;grid-template-rows:56px 1fr 168px;padding:0}
/* Scanlines */
.lobby::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:1}
/* Grid lines bg */
.grid-bg{position:absolute;inset:0;background-image:
  linear-gradient(rgba(37,48,80,.15) 1px,transparent 1px),
  linear-gradient(90deg,rgba(37,48,80,.15) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none}
/* Top bar */
.top-bar{display:flex;align-items:center;padding:0 32px;border-bottom:1px solid var(--border);z-index:2;gap:16px}
.logo{font-family:var(--font-head);font-weight:900;font-size:18px;color:var(--c1);letter-spacing:3px;text-transform:uppercase;text-shadow:0 0 20px rgba(0,229,255,.3)}
.room-name{font-family:var(--font-head);font-size:12px;color:var(--text-dim);letter-spacing:1px;margin-left:8px;padding-left:16px;border-left:1px solid var(--border)}
.top-spacer{flex:1}
.room-code-pill{font-family:var(--font-head);font-size:12px;background:rgba(0,229,255,.06);border:1.5px solid rgba(0,229,255,.25);color:var(--c1);border-radius:20px;padding:6px 18px;letter-spacing:3px;display:none;align-items:center;gap:8px}
.room-code-pill button{background:none;border:none;color:var(--c1);cursor:pointer;font-size:13px}
.leave-btn{font-family:var(--font-body);font-size:12px;background:transparent;border:1px solid rgba(255,68,85,.3);color:#ff6677;border-radius:20px;padding:6px 18px;cursor:pointer;transition:.2s;letter-spacing:.5px}
.leave-btn:hover{background:rgba(255,68,85,.08);border-color:rgba(255,68,85,.5)}
/* Center — 2x2 grid */
.center{display:flex;align-items:center;justify-content:center;z-index:2;padding:16px 32px}
.players-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:14px;width:560px;height:100%}
.p-card{border-radius:10px;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;padding:16px 20px;gap:16px;position:relative;transition:.2s}
.p-card:hover{border-color:rgba(255,255,255,.1);background:var(--surface2)}
.p-card[data-color="1"]{border-left:3px solid var(--c1)}.p-card[data-color="2"]{border-left:3px solid var(--c2)}.p-card[data-color="3"]{border-left:3px solid var(--c3)}.p-card[data-color="4"]{border-left:3px solid var(--c4)}
.p-card.empty{opacity:.3;border-left-color:var(--border)}
.ship-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;animation:float2 3.5s ease-in-out infinite}
.p-card[data-color="1"] .ship-icon{background:rgba(0,229,255,.08);border:2px solid rgba(0,229,255,.3);color:var(--c1);box-shadow:0 0 16px rgba(0,229,255,.1)}
.p-card[data-color="2"] .ship-icon{background:rgba(255,45,155,.08);border:2px solid rgba(255,45,155,.3);color:var(--c2);box-shadow:0 0 16px rgba(255,45,155,.1)}
.p-card[data-color="3"] .ship-icon{background:rgba(255,229,0,.08);border:2px solid rgba(255,229,0,.3);color:var(--c3);box-shadow:0 0 16px rgba(255,229,0,.1)}
.p-card[data-color="4"] .ship-icon{background:rgba(0,255,136,.08);border:2px solid rgba(0,255,136,.3);color:var(--c4);box-shadow:0 0 16px rgba(0,255,136,.1)}
.p-card.empty .ship-icon{background:rgba(100,120,160,.06);border:2px dashed var(--border);color:var(--text-dim);box-shadow:none;animation:none;font-size:22px}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(3deg)}}
.p-info{display:flex;flex-direction:column;gap:4px;flex:1}
.p-name{font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--text);letter-spacing:1px}
.p-meta{display:flex;align-items:center;gap:8px}
.p-badge{font-family:var(--font-head);font-size:8px;letter-spacing:1.5px;padding:2px 8px;border-radius:3px;font-weight:700}
.b-you{background:rgba(0,229,255,.12);color:var(--c1);border:1px solid rgba(0,229,255,.2)}
.b-ai{background:rgba(255,229,0,.1);color:var(--c3);border:1px solid rgba(255,229,0,.18)}
.b-local{background:rgba(0,255,136,.1);color:var(--c4);border:1px solid rgba(0,255,136,.18)}
.b-online{background:rgba(255,45,155,.1);color:var(--c2);border:1px solid rgba(255,45,155,.18)}
.p-host{font-family:var(--font-head);font-size:8px;color:var(--c3);letter-spacing:1.5px}
.kick{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:1px solid rgba(255,68,85,.2);background:transparent;color:rgba(255,68,85,.5);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.p-card:hover .kick{opacity:1}
.kick:hover{background:rgba(255,68,85,.12);color:#ff4455}
.empty-text{font-family:var(--font-body);font-size:12px;color:var(--text-dim)}
/* Right panel — map & controls */
.right-panel{position:absolute;right:32px;top:72px;bottom:176px;width:320px;display:flex;flex-direction:column;gap:14px;z-index:2}
.panel-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.panel-label{font-family:var(--font-head);font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.map-thumb{width:100%;height:100px;border-radius:6px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.map-thumb canvas{width:100%;height:100%;display:block}
.map-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.map-title{font-family:var(--font-head);font-size:12px;color:var(--text);font-weight:600;letter-spacing:1px}
.map-change{font-family:var(--font-head);font-size:9px;color:var(--c1);background:none;border:1px solid rgba(0,229,255,.2);border-radius:4px;padding:4px 10px;cursor:pointer;letter-spacing:1px;transition:.2s}
.map-change:hover{background:rgba(0,229,255,.08)}
.map-description{font-family:var(--font-body);font-size:11px;color:var(--text-dim);line-height:1.4}
.toggle-row{display:flex;gap:6px}
.toggle-opt{flex:1;font-family:var(--font-head);font-size:10px;text-align:center;padding:8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;transition:.2s;letter-spacing:1px}
.toggle-opt.active{border-color:var(--c1);color:var(--c1);background:rgba(0,229,255,.06)}
/* Bottom */
.bottom{display:flex;align-items:center;padding:0 32px;border-top:1px solid var(--border);z-index:2;gap:24px}
.bottom-left{flex:1}
.bottom-status{display:flex;align-items:center;gap:8px;font-family:var(--font-body);font-size:12px;color:var(--text-dim)}
.s-dot{width:8px;height:8px;border-radius:50%;animation:pulse2 1.5s ease-in-out infinite}
.s-dot.g{background:var(--c4);box-shadow:0 0 8px var(--c4)}.s-dot.y{background:var(--c3);box-shadow:0 0 8px var(--c3)}.s-dot.r{background:#ff4455;box-shadow:0 0 8px #ff4455}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}
.player-count{font-family:var(--font-head);font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-top:4px}
.cta{font-family:var(--font-head);font-size:16px;font-weight:800;letter-spacing:4px;text-transform:uppercase;padding:16px 56px;border-radius:8px;cursor:pointer;transition:.25s;position:relative;border:none}
.cta.launch{background:linear-gradient(135deg,#00c8e0,#0090ff);color:#fff;box-shadow:0 4px 25px rgba(0,180,255,.25)}
.cta.launch:hover{box-shadow:0 6px 35px rgba(0,180,255,.4);transform:translateY(-2px)}
.cta.ready{background:linear-gradient(135deg,#00cc77,#00ff88);color:#002211;box-shadow:0 4px 25px rgba(0,255,136,.2)}
.cta.ready:hover{box-shadow:0 6px 35px rgba(0,255,136,.35);transform:translateY(-2px)}
.cta:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.cta:active{transform:scale(.97)}
/* Modal */
.modal-bg{position:absolute;inset:0;background:rgba(4,8,16,.9);z-index:10;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:24px;width:680px;transform:scale(.93);transition:.25s}
.modal-bg.open .modal{transform:scale(1)}
.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-top h2{font-family:var(--font-head);font-size:14px;color:var(--text);letter-spacing:2px;font-weight:700}
.modal-x{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.15s}
.modal-x:hover{color:var(--text);border-color:var(--text-dim)}
.m-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.m-card{border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);padding:10px;cursor:pointer;transition:.2s}
.m-card:hover{border-color:rgba(0,229,255,.4);transform:translateY(-2px)}
.m-card.sel{border-color:var(--c1);box-shadow:0 0 12px rgba(0,229,255,.12)}
.m-card canvas{width:100%;height:70px;border-radius:4px;margin-bottom:6px;display:block}
.m-card span{font-family:var(--font-head);font-size:9px;color:var(--text);letter-spacing:1px}
/* Dev */
.dev-toolbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:#0a0e1a;border-top:1px solid #1e2844;display:flex;align-items:center;padding:0 20px;gap:20px;z-index:100;font-family:var(--font-body)}
.dev-toolbar label{font-size:11px;color:#6878a0;letter-spacing:.5px}
.dev-toolbar select,.dev-toolbar button{font-family:var(--font-body);font-size:11px;background:#141c30;border:1px solid #2a3654;color:#aab;border-radius:4px;padding:4px 10px;cursor:pointer}
.dev-toolbar button.on{background:var(--c1);color:#000;border-color:var(--c1)}
.dev-toolbar .sep{width:1px;height:24px;background:#1e2844}
</style>
</head>
<body>
<div id="scale-wrapper">
<div class="lobby" id="lobby">
  <div class="grid-bg"></div>

  <div class="top-bar">
    <div class="logo">Astro Party</div>
    <div class="room-name" id="room-label">Lobby</div>
    <div class="top-spacer"></div>
    <div class="room-code-pill" id="room-code"><span id="code-val">XKRF42</span><button onclick="navigator.clipboard?.writeText('XKRF42')">⧉</button></div>
    <button class="leave-btn">Leave</button>
  </div>

  <div class="center" id="center">
    <div class="players-grid" id="pgrid"></div>
  </div>

  <div class="right-panel">
    <div class="panel-section">
      <div class="panel-label">Arena</div>
      <div class="map-thumb"><canvas id="mpcanvas"></canvas></div>
      <div class="map-meta"><span class="map-title" id="mname">Classic Rotation</span><button class="map-change" onclick="openModal()">Change</button></div>
      <div class="map-description" id="mdesc">Symmetrical arena with rotating obstacles</div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Game Mode</div>
      <div class="toggle-row" id="mode-row">
        <div class="toggle-opt active" data-m="standard">Standard</div>
        <div class="toggle-opt" data-m="sane">Sane</div>
        <div class="toggle-opt" data-m="chaotic">Chaotic</div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Session</div>
      <div class="toggle-row" id="sess-row">
        <div class="toggle-opt active" data-s="local">Local</div>
        <div class="toggle-opt" data-s="online">Online</div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-left">
      <div class="bottom-status"><span class="s-dot g" id="sdot"></span><span id="slabel">Ready to launch</span></div>
      <div class="player-count" id="pcount">4 / 4 Players</div>
    </div>
    <button class="cta launch" id="cta">LAUNCH</button>
  </div>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <div class="modal-top"><h2>SELECT ARENA</h2><button class="modal-x" onclick="closeModal()">✕</button></div>
      <div class="m-grid" id="mgrid"></div>
    </div>
  </div>
</div>
</div>

<div class="dev-toolbar">
  <label>Players</label>
  <select id="dp" onchange="up()"><option>1</option><option>2</option><option>3</option><option selected>4</option></select>
  <div class="sep"></div>
  <label>Host</label>
  <button id="dh" class="on" onclick="th()">Yes</button>
  <div class="sep"></div>
  <label>Session</label>
  <button id="dl" class="on" onclick="ss('local')">Local</button>
  <button id="do" onclick="ss('online')">Online</button>
  <div class="sep"></div>
  <label>Mode</label>
  <select id="dm" onchange="sm(this.value)"><option>standard</option><option>sane</option><option>chaotic</option></select>
  <div class="sep"></div>
  <label>Map</label>
  <select id="dmap" onchange="selMap(+this.value)"></select>
</div>

<script>
const MAPS=[{n:'Classic Rotation',d:'Symmetrical arena with rotating obstacles'},{n:'The Cache',d:'Central loot zone surrounded by cover'},{n:'Fortress',d:'Fortified corners with open center'},{n:'Void Ring',d:'Circular arena with gravity well'},{n:'Nebula Cross',d:'Cross-shaped corridors through nebula'},{n:'Asteroid Field',d:'Dense floating debris field'}];
const PL=[{n:'Captain',t:'you',c:1},{n:'Nova-7',t:'ai',c:2},{n:'Player 3',t:'local',c:3},{n:'Zephyr',t:'online',c:4}];
let S={p:4,h:true,se:'local',mo:'standard',ma:0};

function drawMap(cv,i,w,h){const x=cv.getContext('2d');cv.width=w;cv.height=h;x.fillStyle='#0a0f20';x.fillRect(0,0,w,h);x.strokeStyle='rgba(0,229,255,.25)';x.lineWidth=1.5;const cx=w/2,cy=h/2;
if(i===0){x.strokeRect(w*.15,h*.15,w*.7,h*.7);x.beginPath();x.arc(cx,cy,18,0,Math.PI*2);x.stroke()}
else if(i===1){x.fillStyle='rgba(0,229,255,.06)';x.fillRect(cx-20,cy-20,40,40);x.strokeRect(cx-20,cy-20,40,40);for(let j=0;j<3;j++){x.strokeRect(w*.15+j*w*.25,h*.25,14,h*.5)}}
else if(i===2){[[w*.1,h*.1],[w*.9-16,h*.1],[w*.1,h*.9-16],[w*.9-16,h*.9-16]].forEach(p=>{x.strokeRect(p[0],p[1],16,16)});x.strokeRect(cx-24,cy-24,48,48)}
else if(i===3){x.beginPath();x.arc(cx,cy,Math.min(w,h)*.33,0,Math.PI*2);x.stroke();x.beginPath();x.arc(cx,cy,6,0,Math.PI*2);x.fillStyle='rgba(255,45,155,.3)';x.fill()}
else if(i===4){x.beginPath();x.moveTo(cx,h*.1);x.lineTo(cx,h*.9);x.moveTo(w*.1,cy);x.lineTo(w*.9,cy);x.stroke()}
else{for(let j=0;j<10;j++){x.beginPath();x.arc(w*.1+Math.random()*w*.8,h*.1+Math.random()*h*.8,2+Math.random()*5,0,Math.PI*2);x.stroke()}}}

function render(){
  const g=document.getElementById('pgrid');g.innerHTML='';
  for(let i=0;i<4;i++){
    if(i<S.p){const p=PL[i];let k=S.h&&i>0?'<button class="kick" title="Remove">✕</button>':'';let ho=i===0?'<span class="p-host">★ HOST</span>':'';
    g.innerHTML+=`<div class="p-card" data-color="${p.c}">${k}<div class="ship-icon" style="animation-delay:${i*.5}s">🚀</div><div class="p-info"><div class="p-name">${p.n}</div><div class="p-meta"><span class="p-badge b-${p.t}">${p.t.toUpperCase()}</span>${ho}</div></div></div>`}
    else{g.innerHTML+=`<div class="p-card empty" data-color="0"><div class="ship-icon">+</div><div class="p-info"><span class="empty-text">Open Slot</span></div></div>`}
  }
  const btn=document.getElementById('cta'),dot=document.getElementById('sdot'),lb=document.getElementById('slabel');
  document.getElementById('pcount').textContent=`${S.p} / 4 Players`;
  if(S.p<2){btn.disabled=true;btn.textContent='LAUNCH';btn.className='cta launch';dot.className='s-dot r';lb.textContent='Need more players'}
  else if(S.h){btn.disabled=false;btn.textContent='LAUNCH';btn.className='cta launch';dot.className='s-dot g';lb.textContent='Ready to launch'}
  else{btn.disabled=false;btn.textContent='READY';btn.className='cta ready';dot.className='s-dot y';lb.textContent='Waiting for host'}
}

function updMap(){const m=MAPS[S.ma];document.getElementById('mname').textContent=m.n;document.getElementById('mdesc').textContent=m.d;drawMap(document.getElementById('mpcanvas'),S.ma,320,100)}

function buildModal(){const g=document.getElementById('mgrid');g.innerHTML='';MAPS.forEach((m,i)=>{const d=document.createElement('div');d.className='m-card'+(i===S.ma?' sel':'');d.innerHTML=`<canvas></canvas><span>${m.n}</span>`;d.onclick=()=>{selMap(i);closeModal()};g.appendChild(d);drawMap(d.querySelector('canvas'),i,200,70)})}

function selMap(i){S.ma=i;updMap();buildModal();document.getElementById('dmap').value=i}
function openModal(){document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}

function ss(v){S.se=v;document.querySelectorAll('#sess-row .toggle-opt').forEach(e=>e.classList.toggle('active',e.dataset.s===v));document.getElementById('room-code').style.display=v==='online'?'flex':'none';document.getElementById('dl').classList.toggle('on',v==='local');document.getElementById('do').classList.toggle('on',v==='online')}
function sm(v){S.mo=v;document.querySelectorAll('#mode-row .toggle-opt').forEach(e=>e.classList.toggle('active',e.dataset.m===v));document.getElementById('dm').value=v}
function th(){S.h=!S.h;document.getElementById('dh').classList.toggle('on',S.h);document.getElementById('dh').textContent=S.h?'Yes':'No';render()}
function up(){S.p=+document.getElementById('dp').value;render()}

document.querySelectorAll('#mode-row .toggle-opt').forEach(e=>e.onclick=()=>sm(e.dataset.m));
document.querySelectorAll('#sess-row .toggle-opt').forEach(e=>e.onclick=()=>ss(e.dataset.s));

const dms=document.getElementById('dmap');MAPS.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m.n;dms.appendChild(o)});

function rescale(){const s=Math.min(window.innerWidth/1280,(window.innerHeight-48)/720);const w=document.getElementById('scale-wrapper');const ox=(window.innerWidth-1280*s)/2;const oy=((window.innerHeight-48)-720*s)/2;w.style.transform=`translate(${ox}px,${oy}px) scale(${s})`}
window.addEventListener('resize',rescale);
render();updMap();buildModal();rescale();
</script>
</body>
</html>
