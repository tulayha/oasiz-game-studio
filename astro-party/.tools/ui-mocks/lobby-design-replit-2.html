<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Astro Party - Comic Space Variant</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --c-p1: #00d2ff;
    --c-p2: #ff3366;
    --c-p3: #ffcc00;
    --c-p4: #00ff66;
    --c-bg: #ffe67c;
    --c-panel: #ffffff;
    --c-border: #000000;
    
    --font-head: 'Bangers', cursive;
    --font-body: 'Montserrat', sans-serif;
  }

  body {
    margin: 0; padding: 0;
    background-color: #333;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    font-family: var(--font-body);
  }

  #canvas-container {
    position: absolute;
    width: 1280px;
    height: 720px;
    background-color: var(--c-bg);
    /* Comic halftone effect */
    background-image: radial-gradient(#ffaa00 15%, transparent 16%), radial-gradient(#ffaa00 15%, transparent 16%);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
    transform-origin: top left;
    box-sizing: border-box;
    display: flex;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    border: 8px solid var(--c-border);
  }

  /* Dev Toolbar */
  #dev-toolbar {
    position: fixed; bottom: 20px; right: 20px;
    background: #000; color: #fff;
    padding: 16px; border-radius: 8px;
    z-index: 9999; font-family: monospace; font-size: 12px;
    display: flex; flex-direction: column; gap: 8px;
    border: 4px solid #fff;
  }
  #dev-toolbar label { display: flex; justify-content: space-between; gap: 12px; }

  /* Comic Panel Styles */
  .comic-panel {
    background: var(--c-panel);
    border: 6px solid var(--c-border);
    box-shadow: 8px 8px 0px var(--c-border);
    border-radius: 4px;
    position: relative;
  }

  .btn {
    font-family: var(--font-head);
    font-size: 24px;
    letter-spacing: 2px;
    background: #fff;
    border: 4px solid var(--c-border);
    box-shadow: 4px 4px 0px var(--c-border);
    cursor: pointer;
    text-transform: uppercase;
    padding: 8px 24px;
    transition: all 0.1s;
  }
  .btn:active:not(:disabled) {
    transform: translate(4px, 4px);
    box-shadow: 0px 0px 0px var(--c-border);
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.primary { background: #ff3366; color: #fff; font-size: 36px; padding: 12px 40px; }
  .btn.primary:hover:not(:disabled) { background: #ff1a53; }

  /* Layout */
  .left-col {
    width: 300px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }
  .center-col {
    flex: 1;
    padding: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .right-col {
    width: 350px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .title-panel {
    padding: 20px;
    text-align: center;
    transform: rotate(-2deg);
  }
  .title-panel h1 {
    font-family: var(--font-head);
    font-size: 54px;
    margin: 0;
    color: var(--c-p1);
    text-shadow: 3px 3px 0 var(--c-border), -1px -1px 0 var(--c-border), 1px -1px 0 var(--c-border), -1px 1px 0 var(--c-border), 1px 1px 0 var(--c-border);
    line-height: 1;
  }

  .room-info {
    padding: 20px;
    transform: rotate(1deg);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .room-code {
    font-size: 28px;
    font-weight: 900;
    background: var(--c-border);
    color: var(--c-bg);
    padding: 10px;
    text-align: center;
    border-radius: 4px;
  }

  /* 2x2 Player Grid */
  .player-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 30px;
    width: 100%;
    height: 100%;
  }

  .player-card {
    background: var(--c-panel);
    border: 6px solid var(--c-border);
    box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .player-card.empty {
    background: rgba(255,255,255,0.5);
    border-style: dashed;
    box-shadow: none;
  }
  .player-card.empty * { display: none; }
  .player-card.empty::after {
    content: 'JOIN NOW!';
    display: block;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-10deg);
    font-family: var(--font-head);
    font-size: 32px;
    color: var(--c-border);
    opacity: 0.3;
  }

  /* Card Accents */
  .player-card[data-slot="1"] { box-shadow: 10px 10px 0px var(--c-p1); }
  .player-card[data-slot="2"] { box-shadow: 10px 10px 0px var(--c-p2); }
  .player-card[data-slot="3"] { box-shadow: 10px 10px 0px var(--c-p3); }
  .player-card[data-slot="4"] { box-shadow: 10px 10px 0px var(--c-p4); }

  .p-header {
    background: var(--c-border);
    color: #fff;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .p-name {
    font-family: var(--font-head);
    font-size: 24px;
    letter-spacing: 1px;
  }
  .p-badge {
    background: #fff;
    color: #000;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 900;
    border-radius: 12px;
  }

  .p-art {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background-size: 40px 40px;
    background-image: radial-gradient(circle, rgba(0,0,0,0.1) 2px, transparent 2px);
  }
  .ship-sprite {
    width: 100px;
    height: 100px;
    background: var(--c-border);
    -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 0 L100 80 L50 60 L0 80 Z"/></svg>') no-repeat center;
    -webkit-mask-size: contain;
    position: relative;
    transform: scale(1.2);
  }
  .player-card[data-slot="1"] .ship-sprite { background: var(--c-p1); }
  .player-card[data-slot="2"] .ship-sprite { background: var(--c-p2); }
  .player-card[data-slot="3"] .ship-sprite { background: var(--c-p3); }
  .player-card[data-slot="4"] .ship-sprite { background: var(--c-p4); }

  .p-footer {
    padding: 10px;
    display: flex;
    justify-content: space-between;
  }
  .btn-kick {
    font-family: var(--font-head);
    background: transparent;
    border: 2px solid var(--c-border);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 12px;
  }
  .btn-kick:hover { background: var(--c-border); color: #fff; }

  /* Right Side Panels */
  .map-panel {
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .map-panel h2 {
    font-family: var(--font-head);
    font-size: 32px;
    margin: 0 0 10px 0;
    border-bottom: 4px solid var(--c-border);
  }
  .map-view {
    flex: 1;
    border: 4px solid var(--c-border);
    background: #e0e0e0;
    margin-bottom: 10px;
    position: relative;
  }
  .map-view canvas { width: 100%; height: 100%; }

  .action-panel {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
    background: var(--c-p1);
  }

  /* Modal */
  .modal-overlay {
    position: absolute; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.8);
    display: none; justify-content: center; align-items: center;
    z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .comic-modal {
    background: #fff;
    border: 8px solid #000;
    box-shadow: 16px 16px 0 #ffaa00;
    width: 800px;
    padding: 30px;
    transform: rotate(-1deg);
  }
  .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .modal-header h2 { font-family: var(--font-head); font-size: 40px; margin:0; }
  .map-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .map-opt {
    border: 4px solid #000;
    cursor: pointer;
    background: #eee;
  }
  .map-opt.selected { background: var(--c-p1); transform: scale(1.05); box-shadow: 4px 4px 0 #000;}
  .map-opt canvas { width: 100%; height: 100px; background: #fff; border-bottom: 4px solid #000; }
  .map-opt p { font-family: var(--font-head); font-size: 20px; text-align: center; margin: 10px 0; }

</style>
</head>
<body>

<div id="canvas-container">
  
  <div class="left-col">
    <div class="comic-panel title-panel">
      <h1>ASTRO<br>PARTY!</h1>
    </div>
    
    <div class="comic-panel room-info">
      <div style="font-family: var(--font-head); font-size: 24px;">MODE: <span id="mode-val" style="color: var(--c-p2)">STANDARD</span></div>
      <button class="btn" id="btn-mode">CHANGE MODE</button>
      <hr style="width:100%; border:2px solid #000; margin: 10px 0;">
      <div style="font-family: var(--font-head); font-size: 24px;">SESSION: <span id="session-val">LOCAL</span></div>
      <button class="btn" id="btn-session">TOGGLE</button>
      
      <div id="online-code-area" style="display:none; margin-top:10px;">
        <div class="room-code">BAM-POW</div>
      </div>
    </div>
    
    <button class="btn" style="margin-top:auto;">LEAVE LOBBY</button>
  </div>

  <div class="center-col">
    <div class="player-grid">
      <!-- P1 -->
      <div class="player-card" data-slot="1" id="slot-1">
        <div class="p-header">
          <span class="p-name" style="color: var(--c-p1)">PLAYER 1</span>
          <span class="p-badge" id="badge-1">YOU (HOST)</span>
        </div>
        <div class="p-art"><div class="ship-sprite"></div></div>
        <div class="p-footer"><button class="btn-kick" style="visibility:hidden">KICK</button></div>
      </div>
      <!-- P2 -->
      <div class="player-card empty" data-slot="2" id="slot-2">
        <div class="p-header">
          <span class="p-name" style="color: var(--c-p2)">AI BOT</span>
          <span class="p-badge" id="badge-2">BOT</span>
        </div>
        <div class="p-art"><div class="ship-sprite"></div></div>
        <div class="p-footer"><button class="btn-kick">KICK</button></div>
      </div>
      <!-- P3 -->
      <div class="player-card empty" data-slot="3" id="slot-3">
        <div class="p-header">
          <span class="p-name" style="color: var(--c-p3)">PLAYER 3</span>
          <span class="p-badge" id="badge-3">LOCAL</span>
        </div>
        <div class="p-art"><div class="ship-sprite"></div></div>
        <div class="p-footer"><button class="btn-kick">KICK</button></div>
      </div>
      <!-- P4 -->
      <div class="player-card empty" data-slot="4" id="slot-4">
        <div class="p-header">
          <span class="p-name" style="color: var(--c-p4)">PLAYER 4</span>
          <span class="p-badge" id="badge-4">ONLINE</span>
        </div>
        <div class="p-art"><div class="ship-sprite"></div></div>
        <div class="p-footer"><button class="btn-kick">KICK</button></div>
      </div>
    </div>
  </div>

  <div class="right-col">
    <div class="comic-panel map-panel">
      <h2>ARENA SELECT</h2>
      <div class="map-view"><canvas id="main-map"></canvas></div>
      <div style="font-weight:900; font-size:20px; text-transform:uppercase; margin-bottom:10px;" id="map-name">Classic Rotation</div>
      <button class="btn" id="btn-map">CHANGE ARENA</button>
    </div>
    
    <div class="comic-panel action-panel">
      <div style="font-family: var(--font-head); font-size: 24px; text-align:center;" id="status-text">WAITING FOR PLAYERS...</div>
      <button class="btn primary" id="btn-launch" disabled>LAUNCH!</button>
    </div>
  </div>

  <!-- Map Modal -->
  <div class="modal-overlay" id="map-modal">
    <div class="comic-modal">
      <div class="modal-header">
        <h2>CHOOSE ARENA</h2>
        <button class="btn" id="btn-close-map">X</button>
      </div>
      <div class="map-grid">
        <div class="map-opt selected" data-map="0"><canvas id="m0"></canvas><p>Classic</p></div>
        <div class="map-opt" data-map="1"><canvas id="m1"></canvas><p>The Cache</p></div>
        <div class="map-opt" data-map="2"><canvas id="m2"></canvas><p>Fortress</p></div>
        <div class="map-opt" data-map="3"><canvas id="m3"></canvas><p>Void Ring</p></div>
        <div class="map-opt" data-map="4"><canvas id="m4"></canvas><p>Nebula Cross</p></div>
        <div class="map-opt" data-map="5"><canvas id="m5"></canvas><p>Asteroid Field</p></div>
      </div>
    </div>
  </div>

</div>

<!-- Dev Toolbar -->
<div id="dev-toolbar">
  <strong>DEV CONTROLS</strong>
  <label>Players <input type="range" id="d-pl" min="1" max="4" value="1"><span id="d-pl-v">1</span></label>
  <label>Is Host <input type="checkbox" id="d-host" checked></label>
  <label>Session 
    <select id="d-sess"><option value="local">Local</option><option value="online">Online</option></select>
  </label>
</div>

<script>
  function resize() {
    const c = document.getElementById('canvas-container');
    const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    c.style.transform = `scale(${scale})`;
    c.style.left = `${(window.innerWidth - 1280 * scale) / 2}px`;
    c.style.top = `${(window.innerHeight - 720 * scale) / 2}px`;
  }
  window.addEventListener('resize', resize);
  resize();

  const state = { players: 1, isHost: true, session: 'local', modeIdx: 0, mapIdx: 0 };
  const modes = ["STANDARD", "SANE", "CHAOTIC"];
  const mapNames = ["Classic Rotation", "The Cache", "Fortress", "Void Ring", "Nebula Cross", "Asteroid Field"];

  function drawMap(cid, type) {
    const c = document.getElementById(cid);
    if(!c) return;
    c.width = c.parentElement.clientWidth;
    c.height = c.parentElement.clientHeight;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    const w = c.width, h = c.height;

    // Comic style drawing (thick lines, solid fills)
    if(type===0) { ctx.strokeRect(w*0.2, h*0.2, w*0.6, h*0.6); ctx.beginPath(); ctx.arc(w/2,h/2,h*0.2,0,Math.PI*2); ctx.stroke(); }
    else if(type===1) { ctx.fillStyle='#ff3366'; ctx.fillRect(w*0.3,h*0.3,w*0.4,h*0.4); ctx.strokeRect(w*0.3,h*0.3,w*0.4,h*0.4); }
    else if(type===2) { ctx.strokeRect(10,10,w*0.2,h-20); ctx.strokeRect(w-w*0.2-10,10,w*0.2,h-20); }
    else if(type===3) { ctx.beginPath(); ctx.arc(w/2,h/2,h*0.4,0,Math.PI*2); ctx.fillStyle='#000'; ctx.fill(); }
    else if(type===4) { ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke(); }
    else if(type===5) { for(let i=0;i<8;i++){ ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,10,0,Math.PI*2); ctx.stroke(); } }
  }

  function renderMaps() {
    drawMap('main-map', state.mapIdx);
    for(let i=0;i<6;i++) drawMap(`m${i}`, i);
  }

  function update() {
    for(let i=1;i<=4;i++) {
      const el = document.getElementById(`slot-${i}`);
      if(i <= state.players) el.classList.remove('empty');
      else el.classList.add('empty');
      
      const kick = el.querySelector('.btn-kick');
      if(kick) kick.style.display = (state.isHost && i!==1) ? 'block' : 'none';
    }

    document.getElementById('badge-1').textContent = state.isHost ? 'YOU (HOST)' : 'YOU';
    document.getElementById('online-code-area').style.display = state.session === 'online' ? 'block' : 'none';
    document.getElementById('session-val').textContent = state.session.toUpperCase();
    document.getElementById('mode-val').textContent = modes[state.modeIdx];
    document.getElementById('map-name').textContent = mapNames[state.mapIdx];

    const launch = document.getElementById('btn-launch');
    const status = document.getElementById('status-text');
    launch.textContent = state.isHost ? 'LAUNCH!' : 'READY!';

    if(state.players < 2) {
      launch.disabled = true; status.textContent = "NEED MORE PLAYERS...";
    } else {
      if(!state.isHost) { launch.disabled = false; status.textContent = "WAITING FOR HOST..."; }
      else { launch.disabled = false; status.textContent = "ALL SYSTEMS GO!"; }
    }

    document.querySelectorAll('.map-opt').forEach(el => {
      el.classList.toggle('selected', parseInt(el.dataset.map) === state.mapIdx);
    });
    renderMaps();
  }

  document.getElementById('d-pl').addEventListener('input', e => { state.players = parseInt(e.target.value); document.getElementById('d-pl-v').textContent = state.players; update(); });
  document.getElementById('d-host').addEventListener('change', e => { state.isHost = e.target.checked; update(); });
  document.getElementById('d-sess').addEventListener('change', e => { state.session = e.target.value; update(); });
  document.getElementById('btn-session').addEventListener('click', () => { state.session = state.session==='local'?'online':'local'; document.getElementById('d-sess').value=state.session; update(); });
  document.getElementById('btn-mode').addEventListener('click', () => { state.modeIdx = (state.modeIdx+1)%modes.length; update(); });
  
  const mod = document.getElementById('map-modal');
  document.getElementById('btn-map').addEventListener('click', () => { mod.classList.add('open'); setTimeout(renderMaps,10); });
  document.getElementById('btn-close-map').addEventListener('click', () => mod.classList.remove('open'));
  document.querySelectorAll('.map-opt').forEach(el => {
    el.addEventListener('click', () => { state.mapIdx = parseInt(el.dataset.map); mod.classList.remove('open'); update(); });
  });

  setTimeout(update, 100);
</script>
</body>
</html>
