<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, minimal-ui">
  <title>Astro Party – Lobby Concept 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #d97706;
      --gold-lt: #f5a623;
      --gold-dk: #92520a;
      --bg:      #060b16;
      --panel:   #0a1020;
      --panel2:  #0e1628;
      --border:  rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.11);
      --text:    #ccd6f0;
      --dim:     rgba(160,180,220,0.58);

      /* ─── FONT SCALE ─── */
      --fs-micro:  9px;   /* decorative section labels (ARENA, GAME MODE) */
      --fs-badge: 13px;   /* type badges (YOU/AI BOT/ONLINE), slot labels (P1-P4) */
      --fs-btn:   12px;   /* all buttons, interactive elements, meta text */
      --fs-body:  14px;   /* secondary body text, roles, descriptions */
      --fs-title: 18px;   /* card names, key display values */

      /* ─── LAYOUT ─── */
      --topbar-h:  58px;
      --strip-h:  130px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Exo 2', sans-serif;
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* dot grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.032) 1px, transparent 1px);
      background-size: 26px 26px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── ROOT ─── */
    .root {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ─── TOPBAR — fixed to device top ─── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,11,22,0.88);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    /* occupies topbar space in flex flow so body starts below it */
    .topbar-rail { height: var(--topbar-h); flex-shrink: 0; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 28px; height: 28px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 14px; height: 14px; }
    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.14em;
      color: var(--text);
    }
    .logo-sub {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-btn);
      letter-spacing: 0.12em;
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 1px;
    }

    .topbar-divider { width: 1px; height: 24px; background: var(--border2); }
    .topbar-spacer  { flex: 1; }

    .session-group {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border2);
      border-radius: 6px;
      overflow: hidden;
    }
    .sgbtn {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-btn);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      background: transparent;
      border: none;
      border-right: 1px solid var(--border2);
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.14s;
    }
    .sgbtn:last-child { border-right: none; }
    .sgbtn.on { background: var(--gold); color: #000; font-weight: 700; }
    .sgbtn:not(.on):hover { color: var(--text); background: rgba(255,255,255,0.05); }

    .room-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(217,119,6,0.28);
      border-radius: 5px;
      padding: 6px 12px;
    }
    .room-tag-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
      animation: blink 2.2s ease-in-out infinite;
    }
    .room-tag-label { font-size: var(--fs-micro); letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; }
    .room-tag-code  { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; color: var(--gold-lt); }
    .room-tag-copy {
      background: transparent; border: none; cursor: pointer;
      color: var(--dim); display: flex; align-items: center;
      padding: 1px; border-radius: 3px; transition: color 0.12s;
    }
    .room-tag-copy:hover { color: var(--gold-lt); }
    .room-tag-copy svg { width: 12px; height: 12px; }

    .leave-btn {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-btn);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(248,113,113,0.7);
      background: rgba(220,38,38,0.07);
      border: 1px solid rgba(248,113,113,0.18);
      border-radius: 5px;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.13s;
    }
    .leave-btn:hover { color: #f87171; background: rgba(220,38,38,0.14); border-color: rgba(248,113,113,0.36); }

    /* ─── BODY — fills all space between topbar and bottom of viewport ─── */
    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    /* left edge bleed — fades outer edge of column 1 into --bg */
    .body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 90px;
      background: linear-gradient(to right, var(--bg) 0%, transparent 100%);
      pointer-events: none;
      z-index: 4;
    }

    /* right edge bleed — fades outer edge of column 4 into --bg */
    .body::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 90px;
      background: linear-gradient(to left, var(--bg) 0%, transparent 100%);
      pointer-events: none;
      z-index: 4;
    }

    /* bottom bleed — cards fade into the control strip gradient */
    .body-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100px;
      background: linear-gradient(to bottom, transparent 0%, var(--bg) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* ─── CARD TRAY — horizontal padding gives edge bleeds room to breathe ─── */
    .card-tray {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      flex: 1;
      min-height: 0;
      padding: 0 32px;
    }

    /* ─── PLAYER CARD — full-height column ─── */
    .pcard {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* thin vertical divider between adjacent cards (gradient fade at top/bottom) */
    .pcard + .pcard::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.07) 15%,
        rgba(255,255,255,0.07) 80%,
        transparent 100%
      );
      z-index: 5;
      pointer-events: none;
    }

    .pcard--filled {
      background: linear-gradient(175deg, rgba(var(--pc-rgb), 0.09) 0%, transparent 38%, var(--bg) 55%);
      transition: background 0.25s ease;
    }
    .pcard--filled:hover {
      background: linear-gradient(175deg, rgba(var(--pc-rgb), 0.16) 0%, transparent 38%, var(--bg) 55%);
    }
    .pcard--filled:hover .card-glow {
      background: radial-gradient(ellipse at 50% 10%, rgba(var(--pc-rgb), 0.36) 0%, rgba(var(--pc-rgb), 0.1) 40%, transparent 65%);
    }
    .pcard--filled:hover .viewport-ring {
      border-color: rgba(var(--pc-rgb), 0.75);
    }
    .pcard--filled:hover .card-viewport {
      transform: scale(1.08);
    }
    .pcard--filled:hover .card-info {
      transform: translateY(-4px);
    }

    .pcard--empty {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ambient radial color glow from top — radiates player color behind ship */
    .card-glow {
      position: absolute;
      top: -40px; left: -20%; right: -20%;
      height: 75%;
      background: radial-gradient(ellipse at 50% 10%, rgba(var(--pc-rgb), 0.22) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.25s ease;
    }

    /* slot label P1–P4 — top right */
    .card-slot {
      position: absolute;
      top: 9px; right: 14px;
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-badge);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(217,119,6,0.6);
      z-index: 6;
    }

    /* type badge — top left */
    .card-type {
      position: absolute;
      top: 9px; left: 14px;
      z-index: 6;
    }
    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-badge);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 3px;
    }
    .type-badge svg { width: 9px; height: 9px; }
    .tb--you    { background: rgba(var(--pc-rgb),0.14); border: 1px solid rgba(var(--pc-rgb),0.3); color: var(--pc); }
    .tb--ai     { background: rgba(139,92,246,0.14); border: 1px solid rgba(139,92,246,0.28); color: #a78bfa; }
    .tb--local  { background: rgba(251,191,36,0.14); border: 1px solid rgba(251,191,36,0.28); color: #fcd34d; }
    .tb--online { background: rgba(52,211,153,0.13); border: 1px solid rgba(52,211,153,0.26); color: #6ee7b7; }

    /* card main — fills remaining height, centers ship viewport */
    .card-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 0;
      z-index: 1;
    }

    /* gradient fade at the bottom of the ship area blending into card-info */
    .card-scene-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 90px;
      background: linear-gradient(to bottom, transparent 0%, var(--bg) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ─── SHIP VIEWPORT ─── */
    .card-viewport {
      position: relative;
      width: 210px; height: 210px;
      flex-shrink: 0;
      z-index: 1;
      transition: transform 0.35s ease;
    }
    .viewport-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(var(--pc-rgb), 0.45);
      animation: ring-pulse 3.8s ease-in-out infinite;
      transition: border-color 0.25s ease;
    }
    @keyframes ring-pulse {
      0%,100% { box-shadow: 0 0 14px rgba(var(--pc-rgb),0.18), inset 0 0 22px rgba(var(--pc-rgb),0.04); }
      50%      { box-shadow: 0 0 30px rgba(var(--pc-rgb),0.34), inset 0 0 36px rgba(var(--pc-rgb),0.09); }
    }
    .viewport-inner {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.04) 0%, #050b15 60%);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .card-ship-svg {
      width: 95px; height: 119px;
      filter: drop-shadow(0 0 12px var(--pc));
      animation: float 4.5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-7px); }
    }

    /* tick marks around viewport */
    .viewport-ticks {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
    }
    .tick {
      position: absolute;
      width: 4px; height: 1px;
      background: rgba(217,119,6,0.35);
      top: 50%; left: 50%;
      transform-origin: -90px 0;
    }

    /* ─── CARD INFO — name / role / footer ─── */
    .card-info {
      position: relative;
      z-index: 6;
      padding: 18px 24px 28px;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease;
      gap: 0;
      flex-shrink: 0;
    }
    .card-name {
      font-size: var(--fs-title);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }
    .card-role {
      font-size: var(--fs-body);
      color: rgba(160,180,220,0.72);
      margin-top: 4px;
      letter-spacing: 0.03em;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      gap: 8px;
    }
    .host-pip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-badge);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(217,119,6,0.1);
      border: 1px solid rgba(217,119,6,0.26);
      padding: 4px 9px;
      border-radius: 3px;
    }
    .host-pip svg { width: 9px; height: 9px; }
    .card-act {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-btn);
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(248,113,113,0.72);
      background: rgba(220,38,38,0.07);
      border: 1px solid rgba(248,113,113,0.18);
      border-radius: 4px;
      padding: 5px 13px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .card-act:hover { color: #f87171; background: rgba(220,38,38,0.13); border-color: rgba(248,113,113,0.35); }

    /* ─── EMPTY CARD CONTENT ─── */
    .empty-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .empty-icon { color: rgba(255,255,255,0.06); }
    .empty-icon svg { width: 44px; height: 44px; }
    .empty-label {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-micro);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(160,180,220,0.45);
    }
    .empty-btns { display: flex; gap: 6px; margin-top: 4px; }
    .empty-btn {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-btn);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(160,180,220,0.45);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .empty-btn:hover { color: var(--gold-lt); border-color: rgba(217,119,6,0.3); background: rgba(217,119,6,0.05); }
    .empty-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ─── CONTROL STRIP — fixed to device bottom, full width ─── */
    .ctrl-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--strip-h);
      display: flex;
      align-items: stretch;
      background: linear-gradient(to bottom, rgba(6,11,22,0) 0%, rgba(6,11,22,0.9) 22%, rgba(6,11,22,0.97) 100%);
      z-index: 8;
      pointer-events: none;
    }
    .cs-map, .cs-mode, .cs-launch { pointer-events: auto; }

    /* MAP SECTION */
    .cs-map {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 28px 20px 20px 28px;
      flex: 0 0 420px;
    }
    .map-thumb-wrap {
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid var(--border2);
      flex-shrink: 0;
    }
    .map-thumb { display: block; width: 110px; height: 74px; }
    .map-meta { display: flex; flex-direction: column; gap: 0; min-width: 0; flex: 1; }
    .map-meta-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .map-section-label {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-micro);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(217,119,6,0.7);
    }
    .map-title {
      font-family: 'Exo 2', sans-serif;
      font-size: var(--fs-body);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .map-desc {
      font-size: var(--fs-body);
      color: var(--dim);
      margin-top: 2px;
    }
    .map-change {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-btn);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold-lt);
      background: rgba(217,119,6,0.08);
      border: 1px solid rgba(217,119,6,0.24);
      border-radius: 4px;
      padding: 5px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.13s;
    }
    .map-change:hover { background: rgba(217,119,6,0.15); border-color: rgba(217,119,6,0.42); }

    /* STRIP DIVIDERS */
    .cs-div { width: 1px; background: var(--border2); margin: 14px 0; }

    /* MODE SECTION */
    .cs-mode {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      padding: 28px 24px 20px;
      flex: 0 0 190px;
    }
    .cs-mode-label {
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-micro);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(217,119,6,0.7);
    }
    .cs-mode-val {
      font-family: 'Orbitron', sans-serif;
      font-size: var(--fs-title);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }
    .cs-mode-cycle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'Space Mono', monospace;
      font-size: var(--fs-btn);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 5px 11px;
      cursor: pointer;
      align-self: flex-start;
      transition: all 0.13s;
    }
    .cs-mode-cycle svg { width: 10px; height: 10px; }
    .cs-mode-cycle:hover { color: var(--text); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.16); }

    /* LAUNCH SECTION */
    .cs-launch {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      padding: 28px 28px 20px 24px;
    }
    .launch-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lstatus-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
      animation: blink 2.4s ease-in-out infinite;
    }
    .lstatus-dot.warn { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .lstatus-text { font-family: 'Space Mono', monospace; font-size: var(--fs-body); letter-spacing: 0.07em; color: var(--dim); }
    .launch-btn {
      height: 52px;
      min-width: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #000;
      background: linear-gradient(135deg, var(--gold-lt), var(--gold));
      border: none;
      border-radius: 7px;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(217,119,6,0.26), 0 4px 10px rgba(0,0,0,0.5);
      transition: all 0.17s ease;
      position: relative;
      overflow: hidden;
    }
    .launch-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -110%;
      width: 75%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.42s ease;
    }
    .launch-btn:hover { background: linear-gradient(135deg, #fbbf24, var(--gold-lt)); box-shadow: 0 0 44px rgba(217,119,6,0.42), 0 6px 18px rgba(0,0,0,0.55); transform: translateY(-1px); }
    .launch-btn:hover::after { left: 130%; }
    .launch-btn:active { transform: translateY(0); }
    .launch-btn:disabled { background: rgba(217,119,6,0.18); color: rgba(0,0,0,0.3); cursor: not-allowed; box-shadow: none; transform: none; }
    .launch-btn svg { width: 16px; height: 16px; }

    /* ─── MAP PICKER MODAL ─── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(4,8,18,0.82);
      backdrop-filter: blur(6px);
      z-index: 50;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .map-modal {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.94);
      width: 760px;
      background: #0b1020;
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 24px;
      z-index: 51;
      opacity: 0; pointer-events: none;
      transition: all 0.2s ease;
      box-shadow: 0 28px 70px rgba(0,0,0,0.88);
    }
    .map-modal.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: var(--text);
    }
    .modal-close {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 5px;
      cursor: pointer; color: var(--dim); transition: all 0.12s;
    }
    .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.09); }
    .modal-close svg { width: 14px; height: 14px; }
    .modal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .mpcard {
      border-radius: 8px; overflow: hidden;
      border: 2px solid var(--border);
      cursor: pointer; background: #060b16;
      transition: all 0.14s; text-align: left;
    }
    .mpcard:hover { border-color: rgba(217,119,6,0.3); }
    .mpcard.sel { border-color: var(--gold); box-shadow: 0 0 18px rgba(217,119,6,0.18); }
    .mpcard canvas { display: block; width: 100%; height: 100px; }
    .mpcard-meta { padding: 7px 10px 9px; }
    .mpcard-name { font-family: 'Orbitron', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--text); }
    .mpcard-desc { font-size: 8.5px; color: var(--dim); margin-top: 2px; }

    /* ─── DEMO BAR ─── */
    .demo-bar {
      position: fixed; bottom: 11px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; align-items: center;
      background: rgba(4,8,18,0.96); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px; padding: 6px 13px; z-index: 200;
      backdrop-filter: blur(12px); font-family: 'Exo 2', sans-serif;
    }
    .dlabel { font-family: 'Space Mono', monospace; font-size: 7px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.28); text-transform: uppercase; padding-right: 2px; }
    .dsep { width: 1px; height: 16px; background: rgba(255,255,255,0.09); margin: 0 2px; }
    .dbtn { font-size: 10px; font-weight: 600; color: rgba(180,195,230,0.55); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 4px; padding: 4px 10px; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
    .dbtn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .dbtn.on { color: var(--gold-lt); background: rgba(217,119,6,0.1); border-color: rgba(217,119,6,0.28); }
  </style>
</head>
<body>

<div class="root">

  <!-- TOPBAR — fixed to device top -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none">
          <polygon points="12,3 20,12 12,21 4,12" fill="none" stroke="#d97706" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="3" fill="#d97706"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">ASTRO PARTY</div>
        <div class="logo-sub">Mission Lobby</div>
      </div>
    </div>
    <div class="topbar-divider"></div>
    <div class="topbar-spacer"></div>
    <div class="session-group">
      <button class="sgbtn" id="sglocal"  onclick="setSession('local')">Local Skirmish</button>
      <button class="sgbtn on" id="sgonline" onclick="setSession('online')">Online Match</button>
    </div>
    <div class="room-tag" id="room-tag">
      <div class="room-tag-dot"></div>
      <span class="room-tag-label">Room</span>
      <span class="room-tag-code">KXZQ</span>
      <button class="room-tag-copy" title="Copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>
    <button class="leave-btn">Leave</button>
  </div>

  <!-- placeholder that takes topbar's space in the flex flow -->
  <div class="topbar-rail"></div>

  <!-- BODY: full-height card columns + edge/bottom fades -->
  <div class="body">
    <div class="card-tray" id="tray"></div>
    <div class="body-fade-bottom"></div>
  </div>

</div>

<!-- CONTROL STRIP — fixed to device bottom, full width -->
<div class="ctrl-strip">
  <div class="cs-map">
    <div class="map-thumb-wrap">
      <canvas class="map-thumb" id="map-thumb" width="110" height="74"></canvas>
    </div>
    <div class="map-meta">
      <div class="map-meta-head">
        <div class="map-section-label">Arena</div>
        <button class="map-change" onclick="openPicker()">Change Arena</button>
      </div>
      <div class="map-title" id="map-title">Classic Rotation</div>
      <div class="map-desc" id="map-desc">Random map each round</div>
    </div>
  </div>

  <div class="cs-div"></div>

  <div class="cs-mode">
    <div class="cs-mode-label">Game Mode</div>
    <div class="cs-mode-val" id="mode-val">Standard</div>
    <button class="cs-mode-cycle" onclick="cycleMode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Cycle Mode
    </button>
  </div>

  <div class="cs-div"></div>

  <div class="cs-launch">
    <div class="launch-status">
      <div class="lstatus-dot" id="ldot"></div>
      <div class="lstatus-text" id="ltext">Ready to launch</div>
    </div>
    <button class="launch-btn" id="launch-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      Launch Match
    </button>
  </div>
</div>

<!-- MAP PICKER MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closePicker()"></div>
<div class="map-modal" id="map-modal">
  <div class="modal-head">
    <div class="modal-title">Select Arena</div>
    <button class="modal-close" onclick="closePicker()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="modal-grid" id="modal-grid"></div>
</div>

<!-- DEMO BAR -->
<div class="demo-bar">
  <span class="dlabel">Demo</span>
  <div class="dsep"></div>
  <button class="dbtn on" id="d4" onclick="setCount(4)">4 Players</button>
  <button class="dbtn"    id="d3" onclick="setCount(3)">3 Players</button>
  <button class="dbtn"    id="d2" onclick="setCount(2)">2 Players</button>
  <button class="dbtn"    id="d1" onclick="setCount(1)">1 Player</button>
  <div class="dsep"></div>
  <button class="dbtn on" id="dhost" onclick="toggleHost()">Is Host</button>
  <div class="dsep"></div>
  <button class="dbtn"    id="dloc" onclick="setSession('local')">Local</button>
  <button class="dbtn on" id="donl" onclick="setSession('online')">Online</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────

const COLORS     = ['#00e5ff', '#ff2d9b', '#ffe500', '#00ff88'];
const COLORS_RAW = ['0,229,255', '255,45,155', '255,229,0', '0,255,136'];
const NAMES      = ['Ace Striker', 'NovaBotX', 'StarChaser', 'CosmoRacer'];
const MODES      = ['Standard', 'Sane', 'Chaotic'];
const SLOTS      = ['P1', 'P2', 'P3', 'P4'];

const MAPS = [
  { id:0, name:'Classic Rotation', desc:'Random arena each round',       draw: drawRotation },
  { id:1, name:'The Cache',        desc:'Corner blocks, center powerup',  draw: drawCache    },
  { id:2, name:'Fortress',         desc:'Fortified corners, open center', draw: drawFortress },
  { id:3, name:'Void Ring',        desc:'Central singularity hazard',     draw: drawVoidRing },
  { id:4, name:'Nebula Cross',     desc:'Four-way corridors with walls',  draw: drawCross    },
  { id:5, name:'Asteroid Field',   desc:'Dense debris, dynamic paths',    draw: drawAsteroids},
];

const state = {
  session: 'online',
  isHost:  true,
  count:   3,
  map:     0,
  mode:    0,
  types:   ['you','ai','online','ai'],
};

// ── SHIP SVG ──────────────────────────────────────────────

function shipSVG(color) {
  return `<svg class="card-ship-svg" viewBox="0 0 72 90" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="36" cy="86" rx="11" ry="4.5" fill="${color}" opacity="0.18"/>
    <ellipse cx="36" cy="83" rx="6"  ry="2.5" fill="${color}" opacity="0.38"/>
    <path d="M28 54 L4 72 L16 68 L26 58 Z" fill="${color}" opacity="0.68"/>
    <path d="M44 54 L68 72 L56 68 L46 58 Z" fill="${color}" opacity="0.68"/>
    <path d="M36 6 L50 46 L50 72 L36 82 L22 72 L22 46 Z" fill="${color}"/>
    <path d="M36 6 L42 30 L36 26 L30 30 Z" fill="rgba(255,255,255,0.22)"/>
    <ellipse cx="36" cy="36" rx="9" ry="13" fill="rgba(255,255,255,0.08)"/>
    <ellipse cx="36" cy="35" rx="5" ry="8"  fill="rgba(255,255,255,0.16)"/>
    <ellipse cx="33" cy="31" rx="2" ry="3"  fill="rgba(255,255,255,0.35)" transform="rotate(-12 33 31)"/>
    <rect x="24" y="60" width="9" height="17" rx="4.5" fill="${color}" opacity="0.82"/>
    <rect x="39" y="60" width="9" height="17" rx="4.5" fill="${color}" opacity="0.82"/>
    <ellipse cx="28.5" cy="77" rx="4.5" ry="2.5" fill="rgba(255,255,255,0.45)"/>
    <ellipse cx="43.5" cy="77" rx="4.5" ry="2.5" fill="rgba(255,255,255,0.45)"/>
    <ellipse cx="36"   cy="82" rx="5"   ry="2.5" fill="rgba(255,255,255,0.32)"/>
  </svg>`;
}

// ── BADGE ─────────────────────────────────────────────────

const BADGE_ICO = {
  you:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`,
  ai:     `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13A2.5 2.5 0 0 0 5 15.5 2.5 2.5 0 0 0 7.5 18a2.5 2.5 0 0 0 2.5-2.5A2.5 2.5 0 0 0 7.5 13m9 0a2.5 2.5 0 0 0-2.5 2.5 2.5 2.5 0 0 0 2.5 2.5 2.5 2.5 0 0 0 2.5-2.5 2.5 2.5 0 0 0-2.5-2.5z"/></svg>`,
  local:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 9h10a4 4 0 0 1 4 4v2a4 4 0 0 1-4 4h-1.2l-2-2H10.2l-2 2H7a4 4 0 0 1-4-4v-2a4 4 0 0 1 4-4zm1 2v2h2v-2H8zm6 0v2h2v-2h-2z"/></svg>`,
  online: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 6l10.5 7L22 6M2 4h20a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/></svg>`,
};
const BADGE_CLS = { you:'tb--you', ai:'tb--ai', local:'tb--local', online:'tb--online' };
const BADGE_LBL = { you:'You', ai:'AI Bot', local:'Local', online:'Online' };

// ── TICK MARKS ────────────────────────────────────────────

function ticksHTML() {
  let h = '';
  for (let i = 0; i < 8; i++) {
    const deg = i * 45;
    h += `<div class="tick" style="transform: rotate(${deg}deg) translateX(-90px)"></div>`;
  }
  return `<div class="viewport-ticks">${h}</div>`;
}

// ── CARD HTML ─────────────────────────────────────────────

function filledCard(i) {
  const color  = COLORS[i];
  const raw    = COLORS_RAW[i];
  const type   = state.types[i] || 'online';
  const name   = NAMES[i];
  const isHost = state.isHost && i === 0;
  const canAct = state.isHost && i !== 0;
  const role   = { you:'Room Leader', ai:'AI Opponent', local:'Local Player', online:'Remote Player' }[type];
  const tbCls = type === 'you' ? '' : BADGE_CLS[type];
  const tbStyle = type === 'you'
    ? `style="background:rgba(${raw},0.14);border:1px solid rgba(${raw},0.3);color:${color}"`
    : '';

  return `
    <div class="pcard pcard--filled" style="--pc:${color};--pc-rgb:${raw}">
      <div class="card-glow"></div>
      <div class="card-slot">${SLOTS[i]}</div>
      <div class="card-type">
        <span class="type-badge ${tbCls}" ${tbStyle}>
          ${BADGE_ICO[type]}${BADGE_LBL[type]}
        </span>
      </div>
      <div class="card-main">
        <div class="card-viewport">
          <div class="viewport-ring"></div>
          <div class="viewport-inner">${shipSVG(color)}</div>
          ${ticksHTML()}
        </div>
        <div class="card-scene-fade"></div>
      </div>
      <div class="card-info">
        <div class="card-name">${name}</div>
        <div class="card-role">${role}</div>
        <div class="card-footer">
          ${isHost
            ? `<span class="host-pip"><svg viewBox="0 0 24 24" fill="currentColor" width="8" height="8"><path d="M5 19h14l1-9-4.5 3.5L12 6 8.5 13.5 4 10l1 9z"/></svg>Host</span>`
            : '<span></span>'}
          ${canAct ? `<button class="card-act">${type==='ai'||type==='local'?'Remove':'Kick'}</button>` : ''}
        </div>
      </div>
    </div>`;
}

function emptyCard(i) {
  const canAdd = state.isHost;
  const localBtn = state.session === 'local'
    ? `<button class="empty-btn" ${canAdd?'':'disabled'}>+ Local</button>` : '';
  return `
    <div class="pcard pcard--empty">
      <div class="empty-content">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <div class="empty-label">${SLOTS[i]} — Empty</div>
        <div class="empty-btns">
          <button class="empty-btn" ${canAdd?'':'disabled'}>+ Add AI</button>
          ${localBtn}
        </div>
      </div>
    </div>`;
}

// ── MAP DRAW ──────────────────────────────────────────────

function clearArena(ctx, w, h) {
  ctx.fillStyle = '#050b14';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.024)';
  ctx.lineWidth = 1;
  const s = Math.min(w,h) / 6;
  for (let x=s; x<w; x+=s) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for (let y=s; y<h; y+=s) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(217,119,6,0.1)';
  ctx.lineWidth = 1;
  ctx.strokeRect(1.5,1.5,w-3,h-3);
}

function drawRotation(ctx, w, h) {
  clearArena(ctx,w,h);
  const cx=w/2,cy=h/2,r=Math.min(w,h)*0.3;
  ctx.strokeStyle='rgba(217,119,6,0.22)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r*0.5,0,Math.PI*2); ctx.stroke();
  for (let i=0;i<8;i++) {
    const a=(i/8)*Math.PI*2;
    ctx.fillStyle=`rgba(217,119,6,${0.15+i*0.045})`;
    ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,2,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='rgba(217,119,6,0.14)';
  ctx.font=`bold ${Math.min(w,h)*0.2}px Orbitron,monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('?',cx,cy+2);
}
function drawCache(ctx,w,h) {
  clearArena(ctx,w,h);
  ctx.fillStyle='rgba(255,200,0,0.48)';
  const bw=w*0.13,bh=h*0.19;
  ctx.fillRect(w*0.08,h*0.12,bw,bh); ctx.fillRect(w*0.79,h*0.12,bw,bh);
  ctx.fillRect(w*0.08,h*0.69,bw,bh); ctx.fillRect(w*0.79,h*0.69,bw,bh);
  ctx.fillRect(w*0.36,h*0.08,w*0.28,h*0.1); ctx.fillRect(w*0.36,h*0.82,w*0.28,h*0.1);
  const s=Math.min(w,h)*0.065,cx=w/2,cy=h/2;
  ctx.strokeStyle='rgba(255,80,200,0.55)'; ctx.lineWidth=1.5;
  ctx.strokeRect(cx-s,cy-s,s*2,s*2);
  ctx.fillStyle='rgba(255,80,200,0.38)'; ctx.beginPath(); ctx.arc(cx,cy,s*0.5,0,Math.PI*2); ctx.fill();
}
function drawFortress(ctx,w,h) {
  clearArena(ctx,w,h);
  ctx.fillStyle='rgba(217,119,6,0.2)';
  const fw=w*0.15,fh=h*0.22;
  ctx.fillRect(w*0.04,h*0.04,fw,fh); ctx.fillRect(w*0.81,h*0.04,fw,fh);
  ctx.fillRect(w*0.04,h*0.74,fw,fh); ctx.fillRect(w*0.81,h*0.74,fw,fh);
  const pw=w*0.22,ph=h*0.22;
  ctx.fillStyle='rgba(217,119,6,0.08)'; ctx.fillRect(w/2-pw/2,h/2-ph/2,pw,ph);
  ctx.strokeStyle='rgba(217,119,6,0.16)'; ctx.lineWidth=1; ctx.strokeRect(w/2-pw/2,h/2-ph/2,pw,ph);
}
function drawVoidRing(ctx,w,h) {
  clearArena(ctx,w,h);
  const cx=w/2,cy=h/2,r=Math.min(w,h)*0.19;
  const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.4);
  gr.addColorStop(0,'rgba(0,0,0,0.92)'); gr.addColorStop(0.55,'rgba(80,0,140,0.45)'); gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(cx,cy,r*1.6,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(190,80,255,0.45)'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(190,80,255,0.12)'; ctx.lineWidth=8;   ctx.beginPath(); ctx.arc(cx,cy,r*1.25,0,Math.PI*2); ctx.stroke();
}
function drawCross(ctx,w,h) {
  clearArena(ctx,w,h);
  ctx.fillStyle='rgba(255,55,55,0.14)';
  ctx.fillRect(0,h*0.36,w,h*0.28); ctx.fillRect(w*0.4,0,w*0.2,h);
  ctx.fillStyle='rgba(255,100,50,0.24)';
  ctx.fillRect(w*0.0,h*0.0,w*0.12,h*0.36); ctx.fillRect(w*0.88,h*0.0,w*0.12,h*0.36);
  ctx.fillRect(w*0.0,h*0.64,w*0.12,h*0.36); ctx.fillRect(w*0.88,h*0.64,w*0.12,h*0.36);
}
function drawAsteroids(ctx,w,h) {
  clearArena(ctx,w,h);
  const rocks=[{x:.15,y:.2,r:.065},{x:.8,y:.28,r:.055},{x:.28,y:.72,r:.075},{x:.68,y:.76,r:.06},{x:.5,y:.22,r:.045},{x:.18,y:.52,r:.05},{x:.76,y:.52,r:.065}];
  ctx.fillStyle='rgba(155,135,115,0.44)';
  for (const a of rocks) { ctx.beginPath(); ctx.arc(a.x*w,a.y*h,Math.min(w,h)*a.r,0,Math.PI*2); ctx.fill(); }
}

// ── RENDER ────────────────────────────────────────────────

function renderCards() {
  let html = '';
  for (let i = 0; i < 4; i++) {
    html += i < state.count ? filledCard(i) : emptyCard(i);
  }
  document.getElementById('tray').innerHTML = html;
}

function renderMap() {
  const canvas = document.getElementById('map-thumb');
  canvas.width = 110; canvas.height = 74;
  MAPS[state.map].draw(canvas.getContext('2d'), 110, 74);
  document.getElementById('map-title').textContent = MAPS[state.map].name;
  document.getElementById('map-desc').textContent  = MAPS[state.map].desc;
}

function renderMode() { document.getElementById('mode-val').textContent = MODES[state.mode]; }

function renderStatus() {
  const dot = document.getElementById('ldot');
  const txt = document.getElementById('ltext');
  const btn = document.getElementById('launch-btn');
  if (state.count >= 2) {
    dot.className = 'lstatus-dot';
    txt.textContent = state.isHost ? 'Ready to launch' : 'Waiting for host\u2026';
    btn.disabled = !state.isHost;
  } else {
    dot.className = 'lstatus-dot warn';
    txt.textContent = 'Need at least 2 players';
    btn.disabled = true;
  }
}

function renderTopbar() {
  document.getElementById('sglocal').classList.toggle('on', state.session==='local');
  document.getElementById('sgonline').classList.toggle('on', state.session==='online');
  document.getElementById('room-tag').style.display = state.session==='online' ? 'flex' : 'none';
}

function render() {
  renderCards();
  renderMap();
  renderMode();
  renderStatus();
  renderTopbar();
}

// ── MAP PICKER ────────────────────────────────────────────

function openPicker() {
  buildModalGrid();
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('map-modal').classList.add('open');
}
function closePicker() {
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('map-modal').classList.remove('open');
}
function buildModalGrid() {
  const grid = document.getElementById('modal-grid');
  if (grid.children.length) {
    grid.querySelectorAll('.mpcard').forEach((c,i) => c.classList.toggle('sel', i===state.map));
    return;
  }
  grid.innerHTML = MAPS.map((m,i) =>
    `<button class="mpcard${i===state.map?' sel':''}" onclick="selectMap(${i})">
      <canvas id="mg${i}" width="220" height="100"></canvas>
      <div class="mpcard-meta">
        <div class="mpcard-name">${m.name}</div>
        <div class="mpcard-desc">${m.desc}</div>
      </div>
    </button>`
  ).join('');
  MAPS.forEach((m,i) => { const c=document.getElementById('mg'+i); m.draw(c.getContext('2d'),220,100); });
}
function selectMap(i) {
  state.map = i;
  renderMap();
  document.getElementById('modal-grid').querySelectorAll('.mpcard')
    .forEach((c,j) => c.classList.toggle('sel', j===i));
  closePicker();
}

// ── INTERACTIONS ──────────────────────────────────────────

function cycleMode() { state.mode = (state.mode+1) % MODES.length; renderMode(); }
function toggleHost() { state.isHost=!state.isHost; document.getElementById('dhost').classList.toggle('on',state.isHost); render(); }
function setCount(n) {
  state.count = n;
  ['d4','d3','d2','d1'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById('d'+n).classList.add('on');
  render();
}
function setSession(s) {
  state.session = s;
  state.types = s==='online' ? ['you','ai','online','ai'] : ['you','ai','local','ai'];
  document.getElementById('dloc').classList.toggle('on', s==='local');
  document.getElementById('donl').classList.toggle('on', s==='online');
  render();
}

render();
</script>
</body>
</html>
