<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, minimal-ui">
  <title>Astro Party - Lobby Design Codex V3</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:   #090112;
      --pink: #ff0066;
      --vio:  #9900ff;
      --text: #edd5ff;
      --dim:  rgba(200,150,255,0.48);
      --bdr:  rgba(255,0,102,0.18);
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: 'Exo 2', sans-serif;
      color: var(--text);
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    /* scanlines */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 100;
    }

    #stage {
      position: fixed; top: 0; left: 0;
      width: 1280px; height: 720px;
      transform-origin: top left; z-index: 1;
    }
    .root { width: 1280px; height: 720px; display: flex; flex-direction: column; overflow: hidden; }

    /* TOPBAR */
    .topbar {
      height: 52px; flex-shrink: 0;
      display: flex; align-items: center; gap: 14px;
      padding: 0 26px;
      background: rgba(9,1,18,0.92);
      border-bottom: 1px solid rgba(255,0,102,0.22);
      backdrop-filter: blur(10px);
    }
    .logo {
      font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900;
      letter-spacing: 0.14em;
      background: linear-gradient(90deg, #ff0066, #cc00ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-tag {
      font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,0,102,0.6); margin-left: 2px; margin-top: 2px;
    }
    .tb-spacer { flex: 1; }
    .sess-seg {
      display: flex; border: 1px solid var(--bdr); border-radius: 6px; overflow: hidden;
    }
    .sbtn {
      font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--dim); background: transparent; border: none;
      border-right: 1px solid var(--bdr);
      padding: 6px 15px; cursor: pointer; transition: all 0.13s;
    }
    .sbtn:last-child { border-right: none; }
    .sbtn.on { background: var(--pink); color: #fff; }
    .sbtn:not(.on):hover { color: var(--text); background: rgba(255,0,102,0.07); }
    .room-pill {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,0,102,0.3);
      border-radius: 6px; padding: 5px 12px;
    }
    .rp-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--pink); box-shadow: 0 0 7px var(--pink); animation: blk 2s ease-in-out infinite; }
    @keyframes blk { 0%,100%{opacity:1} 50%{opacity:.3} }
    .rp-lbl { font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; }
    .rp-code { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.17em; color: var(--pink); }
    .rp-copy { background: none; border: none; cursor: pointer; color: var(--dim); display: flex; align-items: center; padding: 1px; transition: color 0.12s; }
    .rp-copy:hover { color: var(--pink); }
    .rp-copy svg { width: 12px; height: 12px; }
    .leave-btn {
      font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(248,113,113,0.7); background: rgba(220,38,38,0.07);
      border: 1px solid rgba(248,113,113,0.18); border-radius: 5px;
      padding: 6px 13px; cursor: pointer; transition: all 0.13s;
    }
    .leave-btn:hover { color: #f87171; background: rgba(220,38,38,0.14); border-color: rgba(248,113,113,0.36); }

    /* BODY */
    .body {
      flex: 1; display: flex; min-height: 0;
      position: relative; overflow: hidden;
    }

    /* synthwave background elements */
    .sw-sun {
      position: absolute; left: 50%; bottom: 0;
      transform: translateX(-50%);
      width: 700px; height: 350px;
      border-radius: 700px 700px 0 0;
      background: linear-gradient(to top, rgba(255,0,102,0.55) 0%, rgba(255,80,0,0.28) 40%, rgba(200,0,255,0.1) 70%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    .sw-sun::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: repeating-linear-gradient(to top, transparent 0px, transparent 9px, rgba(9,1,18,0.65) 9px, rgba(9,1,18,0.65) 12px);
    }
    .sw-grid {
      position: absolute; left: 50%; bottom: 0;
      transform: translateX(-50%) perspective(280px) rotateX(72deg);
      transform-origin: bottom center;
      width: 1400px; height: 380px;
      background:
        repeating-linear-gradient(90deg, rgba(255,0,102,0.13) 0px, rgba(255,0,102,0.13) 1px, transparent 1px, transparent 55px),
        repeating-linear-gradient(0deg,  rgba(255,0,102,0.13) 0px, rgba(255,0,102,0.13) 1px, transparent 1px, transparent 55px);
      pointer-events: none; z-index: 0;
    }
    /* horizon line */
    .sw-horizon {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 1px; background: linear-gradient(90deg, transparent, var(--pink), transparent);
      opacity: 0.45; z-index: 1; pointer-events: none;
    }

    /* LEFT — featured YOU card */
    .left-col {
      flex: 0 0 50%; display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 2;
    }
    .feat-card {
      width: 300px; height: 460px;
      background: rgba(18,4,36,0.88);
      border: 1.5px solid var(--pc);
      border-radius: 14px; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 0 24px rgba(var(--pcr),0.22), 0 0 60px rgba(var(--pcr),0.07);
      transition: box-shadow 0.3s ease;
      position: relative;
    }
    .feat-card:hover {
      box-shadow: 0 0 36px rgba(var(--pcr),0.35), 0 0 80px rgba(var(--pcr),0.12);
    }
    /* color stripe top */
    .feat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--pc); box-shadow: 0 0 12px var(--pc); z-index: 2;
    }
    /* ambient top bleed */
    .feat-ambient {
      position: absolute; top: 0; left: 0; right: 0; height: 300px;
      background: radial-gradient(ellipse at 50% 0%, var(--pc) 0%, transparent 70%);
      opacity: 0.09; pointer-events: none; z-index: 0;
    }
    .feat-slot {
      position: absolute; top: 10px; right: 13px;
      font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; color: rgba(var(--pcr),0.55);
      background: rgba(var(--pcr),0.1); border-radius: 4px; padding: 2px 7px; z-index: 3;
    }
    .feat-typebadge {
      position: absolute; top: 10px; left: 12px;
      display: inline-flex; align-items: center; gap: 3px;
      font-family: 'Orbitron', sans-serif; font-size: 7.5px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      background: rgba(var(--pcr),0.14); border: 1px solid rgba(var(--pcr),0.3);
      color: var(--pc); padding: 3px 7px; border-radius: 4px; z-index: 3;
    }
    .feat-typebadge svg { width: 8px; height: 8px; }
    .feat-ship-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }
    .feat-ship-glow {
      position: absolute; width: 160px; height: 160px; border-radius: 50%;
      background: var(--pc); opacity: 0.1; filter: blur(30px);
      animation: gpulse 3.5s ease-in-out infinite;
    }
    @keyframes gpulse { 0%,100%{opacity:.08;transform:scale(.9)} 50%{opacity:.16;transform:scale(1.08)} }
    .feat-ship-svg { width: 88px; height: 110px; position: relative; z-index: 1; animation: flt 4s ease-in-out infinite; filter: drop-shadow(0 0 12px var(--pc)); }
    @keyframes flt { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .feat-info {
      padding: 12px 16px 16px; border-top: 1px solid rgba(var(--pcr),0.18);
      position: relative; z-index: 1;
    }
    .feat-name { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
    .feat-role { font-size: 10px; color: var(--dim); margin-top: 2px; }
    .feat-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .host-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-family: 'Orbitron', sans-serif; font-size: 7.5px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.28);
      color: #f59e0b; border-radius: 4px; padding: 3px 8px;
    }
    .host-badge svg { width: 8px; height: 8px; }

    /* RIGHT — opponent rows + controls */
    .right-col {
      flex: 0 0 50%; display: flex; flex-direction: column;
      padding: 18px 24px 18px 12px;
      position: relative; z-index: 2; gap: 0;
    }

    /* opponent rows */
    .opp-row {
      display: flex; align-items: center; gap: 12px;
      height: 118px; flex-shrink: 0;
      background: rgba(18,4,36,0.78);
      border: 1px solid rgba(var(--pcr),0.18);
      border-left: 3px solid var(--pc);
      border-radius: 10px; padding: 0 16px;
      margin-bottom: 10px;
      position: relative; overflow: hidden;
      transition: border-color 0.2s;
    }
    .opp-row:hover { border-color: rgba(var(--pcr),0.36); border-left-color: var(--pc); }
    .opp-row-ambient {
      position: absolute; left: 0; top: 0; bottom: 0; width: 120px;
      background: linear-gradient(90deg, rgba(var(--pcr),0.08) 0%, transparent 100%);
      pointer-events: none;
    }
    /* viewport circle for opponent row */
    .opp-vp {
      width: 72px; height: 72px; flex-shrink: 0;
      border-radius: 50%; position: relative;
      border: 1.5px solid var(--pc);
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.04) 0%, #050010 60%);
      box-shadow: 0 0 14px rgba(var(--pcr),0.2);
    }
    .opp-ship-svg { width: 38px; height: 48px; filter: drop-shadow(0 0 7px var(--pc)); animation: flt 4.5s ease-in-out infinite; }
    .opp-info { flex: 1; min-width: 0; }
    .opp-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .opp-role { font-size: 10px; color: var(--dim); margin-top: 2px; }
    .opp-foot { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .opp-tbadge {
      display: inline-flex; align-items: center; gap: 3px;
      font-family: 'Orbitron', sans-serif; font-size: 7px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: rgba(var(--pcr),0.12); border: 1px solid rgba(var(--pcr),0.25);
      color: var(--pc); padding: 2px 7px; border-radius: 3px;
    }
    .opp-tbadge svg { width: 7px; height: 7px; }
    .opp-slot { font-family: 'Orbitron', sans-serif; font-size: 9px; color: rgba(var(--pcr),0.45); letter-spacing: 0.08em; }
    .opp-act {
      font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: rgba(248,113,113,0.72); background: rgba(220,38,38,0.07);
      border: 1px solid rgba(248,113,113,0.18); border-radius: 4px;
      padding: 3px 9px; cursor: pointer; transition: all 0.12s; flex-shrink: 0;
    }
    .opp-act:hover { color: #f87171; background: rgba(220,38,38,0.13); border-color: rgba(248,113,113,0.35); }

    /* empty opponent row */
    .opp-empty {
      height: 118px; flex-shrink: 0; margin-bottom: 10px;
      border: 2px dashed rgba(255,0,102,0.15);
      border-radius: 10px; padding: 0 20px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: all 0.15s;
    }
    .opp-empty:hover { border-color: rgba(255,0,102,0.32); background: rgba(255,0,102,0.03); }
    .oe-plus { color: rgba(255,0,102,0.25); } .oe-plus svg { width: 28px; height: 28px; }
    .oe-slot { font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; }
    .oe-btns { display: flex; gap: 7px; margin-left: auto; }
    .oe-btn {
      font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dim); background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,0,102,0.15); border-radius: 4px;
      padding: 5px 12px; cursor: pointer; transition: all 0.12s;
    }
    .oe-btn:hover { color: var(--pink); border-color: rgba(255,0,102,0.38); background: rgba(255,0,102,0.06); }

    /* CONTROLS (below rows in right col) */
    .ctrl-box {
      flex: 1; display: flex; flex-direction: column;
      background: rgba(18,4,36,0.8);
      border: 1px solid var(--bdr);
      border-radius: 12px; padding: 14px 16px;
      gap: 10px; min-height: 0;
    }
    .ctrl-map-row { display: flex; align-items: center; gap: 12px; }
    .mbox { border-radius: 7px; overflow: hidden; border: 1px solid rgba(255,0,102,0.2); flex-shrink: 0; }
    .mthumb { display: block; width: 110px; height: 72px; }
    .mmeta { display: flex; flex-direction: column; min-width: 0; flex: 1; }
    .mslbl { font-family: 'Orbitron', sans-serif; font-size: 7px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,0,102,0.65); margin-bottom: 3px; }
    .mname { font-family: 'Orbitron', sans-serif; font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mdesc { font-size: 9.5px; color: var(--dim); margin-top: 2px; }
    .mchg {
      font-family: 'Orbitron', sans-serif; font-size: 7.5px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--pink); background: rgba(255,0,102,0.08);
      border: 1px solid rgba(255,0,102,0.24); border-radius: 4px;
      padding: 4px 10px; cursor: pointer; align-self: flex-start; margin-top: 5px; transition: all 0.12s; white-space: nowrap;
    }
    .mchg:hover { background: rgba(255,0,102,0.15); border-color: rgba(255,0,102,0.44); }
    .ctrl-hdiv { height: 1px; background: var(--bdr); flex-shrink: 0; }
    .ctrl-mode-row { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .mode-left { }
    .mode-lbl { font-family: 'Orbitron', sans-serif; font-size: 7px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,0,102,0.65); }
    .mode-val { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); margin-top: 3px; }
    .cycle-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dim); background: rgba(255,255,255,0.04);
      border: 1px solid var(--bdr); border-radius: 4px;
      padding: 6px 12px; cursor: pointer; transition: all 0.12s;
    }
    .cycle-btn svg { width: 10px; height: 10px; }
    .cycle-btn:hover { color: var(--text); border-color: rgba(255,0,102,0.35); background: rgba(255,0,102,0.07); }
    .ctrl-spacer { flex: 1; }
    .ctrl-bottom { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .stat-row { display: flex; align-items: center; gap: 6px; }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; box-shadow: 0 0 7px #10b981; animation: blk 2.2s ease-in-out infinite; }
    .sdot.w { background: #f59e0b; box-shadow: 0 0 7px #f59e0b; }
    .stxt { font-family: 'Orbitron', sans-serif; font-size: 8.5px; letter-spacing: 0.07em; color: var(--dim); }
    .lbtn {
      height: 46px; flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 900;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: #fff;
      background: linear-gradient(90deg, var(--pink), var(--vio));
      border: none; border-radius: 7px; cursor: pointer;
      box-shadow: 0 0 24px rgba(255,0,102,0.3), 0 4px 10px rgba(0,0,0,0.5);
      transition: all 0.17s ease; position: relative; overflow: hidden;
    }
    .lbtn::after { content: ''; position: absolute; top: 0; left: -110%; width: 75%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.42s ease; }
    .lbtn:hover { box-shadow: 0 0 40px rgba(255,0,102,0.48), 0 6px 18px rgba(0,0,0,0.55); transform: translateY(-1px); }
    .lbtn:hover::after { left: 130%; }
    .lbtn:active { transform: translateY(0); }
    .lbtn:disabled { background: rgba(255,0,102,0.2); color: rgba(255,255,255,0.3); cursor: not-allowed; box-shadow: none; transform: none; }
    .lbtn svg { width: 15px; height: 15px; }

    /* MAP PICKER */
    .mbg { position: absolute; inset: 0; background: rgba(5,0,12,0.82); backdrop-filter: blur(6px); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .mbg.open { opacity: 1; pointer-events: all; }
    .mmod {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.95);
      width: 760px; background: #0e0120; border: 1px solid rgba(255,0,102,0.24);
      border-radius: 14px; padding: 22px; z-index: 51;
      opacity: 0; pointer-events: none; transition: all .2s ease;
      box-shadow: 0 24px 64px rgba(0,0,0,0.88);
    }
    .mmod.open { opacity: 1; pointer-events: all; transform: translate(-50%,-50%) scale(1); }
    .mh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .mt { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: var(--text); }
    .mc { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--bdr); border-radius: 6px; cursor: pointer; color: var(--dim); transition: all .12s; }
    .mc:hover { color: var(--text); background: rgba(255,255,255,0.09); }
    .mc svg { width: 14px; height: 14px; }
    .mgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 11px; }
    .mpc { border-radius: 8px; overflow: hidden; border: 2px solid var(--bdr); cursor: pointer; background: #060010; transition: all .13s; text-align: left; }
    .mpc:hover { border-color: rgba(255,0,102,0.38); }
    .mpc.sel { border-color: var(--pink); box-shadow: 0 0 16px rgba(255,0,102,0.22); }
    .mpc canvas { display: block; width: 100%; height: 100px; }
    .mpci { padding: 7px 9px 9px; }
    .mpcn { font-family: 'Orbitron', sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.05em; color: var(--text); }
    .mpcd { font-size: 8.5px; color: var(--dim); margin-top: 2px; }

    /* DEMO BAR */
    .dbar { position: fixed; bottom: 11px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; align-items: center; background: rgba(5,0,12,0.96); border: 1px solid rgba(255,0,102,0.2); border-radius: 8px; padding: 6px 13px; z-index: 200; backdrop-filter: blur(12px); }
    .dlbl { font-family: 'Orbitron', sans-serif; font-size: 7px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,0,102,0.4); text-transform: uppercase; }
    .ds { width: 1px; height: 16px; background: rgba(255,0,102,0.15); margin: 0 2px; }
    .db { font-family: 'Exo 2', sans-serif; font-size: 10px; font-weight: 600; color: rgba(200,150,255,0.55); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,0,102,0.1); border-radius: 4px; padding: 4px 10px; cursor: pointer; transition: all .12s; white-space: nowrap; }
    .db:hover { color: #fff; background: rgba(255,0,102,0.1); }
    .db.on { color: var(--pink); background: rgba(255,0,102,0.1); border-color: rgba(255,0,102,0.32); }
  </style>
</head>
<body>
<div id="stage">
  <div class="root">
    <div class="topbar">
      <div>
        <div class="logo">ASTRO PARTY</div>
        <div class="logo-tag">Mission Lobby</div>
      </div>
      <div class="tb-spacer"></div>
      <div class="sess-seg">
        <button class="sbtn" id="sgl" onclick="setSess('local')">Local</button>
        <button class="sbtn on" id="sgo" onclick="setSess('online')">Online</button>
      </div>
      <div class="room-pill" id="rpill">
        <div class="rp-dot"></div>
        <span class="rp-lbl">Room</span>
        <span class="rp-code">KXZQ</span>
        <button class="rp-copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
      </div>
      <button class="leave-btn">Leave</button>
    </div>

    <div class="body">
      <!-- synthwave background -->
      <div class="sw-sun"></div>
      <div class="sw-grid"></div>
      <div class="sw-horizon"></div>

      <!-- left: featured YOU card -->
      <div class="left-col">
        <div id="feat-wrap"></div>
      </div>

      <!-- right: opponent rows + controls -->
      <div class="right-col">
        <div id="opp-rows"></div>
        <div class="ctrl-box">
          <div class="ctrl-map-row">
            <div class="mbox"><canvas class="mthumb" id="mthumb" width="110" height="72"></canvas></div>
            <div class="mmeta">
              <div class="mslbl">Arena</div>
              <div class="mname" id="mname">Classic Rotation</div>
              <div class="mdesc" id="mdesc">Random map each round</div>
              <button class="mchg" onclick="openP()">Change Arena</button>
            </div>
          </div>
          <div class="ctrl-hdiv"></div>
          <div class="ctrl-mode-row">
            <div class="mode-left">
              <div class="mode-lbl">Game Mode</div>
              <div class="mode-val" id="mval">Standard</div>
            </div>
            <button class="cycle-btn" onclick="cycleM()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Cycle
            </button>
          </div>
          <div class="ctrl-spacer"></div>
          <div class="ctrl-bottom">
            <div class="stat-row"><div class="sdot" id="sdot"></div><div class="stxt" id="stxt">Ready</div></div>
            <button class="lbtn" id="lbtn">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>Launch
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mbg" id="mbg" onclick="closeP()"></div>
  <div class="mmod" id="mmod">
    <div class="mh">
      <div class="mt">Select Arena</div>
      <button class="mc" onclick="closeP()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mgrid" id="mgrid"></div>
  </div>
</div>

<div class="dbar">
  <span class="dlbl">Demo</span><div class="ds"></div>
  <button class="db on" id="d4" onclick="setCnt(4)">4P</button>
  <button class="db"    id="d3" onclick="setCnt(3)">3P</button>
  <button class="db"    id="d2" onclick="setCnt(2)">2P</button>
  <button class="db"    id="d1" onclick="setCnt(1)">1P</button>
  <div class="ds"></div>
  <button class="db on" id="dh" onclick="togHost()">Host</button>
  <div class="ds"></div>
  <button class="db"    id="dl" onclick="setSess('local')">Local</button>
  <button class="db on" id="dol" onclick="setSess('online')">Online</button>
  <div class="ds"></div>
  <button class="db" id="dmap" onclick="quickMap()">Map +</button>
  <button class="db" id="dmode" onclick="quickMode()">Mode +</button>
</div>

<script>
const COLORS = ['#00e5ff','#ff2d9b','#ffe500','#00ff88'];
const COLORSR= ['0,229,255','255,45,155','255,229,0','0,255,136'];
const NAMES  = ['YOU','NovaBotX','StarChaser','CosmoRacer'];
const MODES  = ['Standard','Sane','Chaotic'];
const SLOTS  = ['P1','P2','P3','P4'];
const MAPS   = [
  {n:'Classic Rotation', d:'Random arena each round',      f:mRot},
  {n:'The Cache',        d:'Corner blocks, center powerup', f:mCache},
  {n:'Fortress',         d:'Fortified corners, open center',f:mFort},
  {n:'Void Ring',        d:'Central singularity hazard',   f:mVoid},
  {n:'Nebula Cross',     d:'Four-way corridors with walls', f:mCross},
  {n:'Asteroid Field',   d:'Dense debris, dynamic paths',  f:mAst},
];
const st = {sess:'online', isHost:true, cnt:3, map:0, mode:0};
const types = () => st.sess==='online' ? ['you','ai','online','ai'] : ['you','ai','local','ai'];

const BICO = {
  you:   '<svg viewBox="0 0 24 24" fill="currentColor" width="7" height="7"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>',
  ai:    '<svg viewBox="0 0 24 24" fill="currentColor" width="7" height="7"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13A2.5 2.5 0 0 0 5 15.5 2.5 2.5 0 0 0 7.5 18a2.5 2.5 0 0 0 2.5-2.5A2.5 2.5 0 0 0 7.5 13m9 0a2.5 2.5 0 0 0-2.5 2.5 2.5 2.5 0 0 0 2.5 2.5 2.5 2.5 0 0 0 2.5-2.5 2.5 2.5 0 0 0-2.5-2.5z"/></svg>',
  local: '<svg viewBox="0 0 24 24" fill="currentColor" width="7" height="7"><path d="M7 9h10a4 4 0 0 1 4 4v2a4 4 0 0 1-4 4h-1.2l-2-2H10.2l-2 2H7a4 4 0 0 1-4-4v-2a4 4 0 0 1 4-4zm1 2v2h2v-2H8zm6 0v2h2v-2h-2z"/></svg>',
  online:'<svg viewBox="0 0 24 24" fill="currentColor" width="7" height="7"><path d="M1 6l10.5 7L22 6M2 4h20a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/></svg>',
};
const BLBL = {you:'YOU',ai:'AI BOT',local:'LOCAL',online:'ONLINE'};
const ROLE = {you:'Room Leader',ai:'AI Opponent',local:'Local Player',online:'Remote Player'};

function shipSVG(color, w=72, h=90) {
  return `<svg class="${w>50?'feat-ship-svg':'opp-ship-svg'}" viewBox="0 0 72 90" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="36" cy="86" rx="11" ry="4.5" fill="${color}" opacity="0.2"/>
    <path d="M28 54 L4 72 L16 68 L26 58 Z" fill="${color}" opacity="0.68"/>
    <path d="M44 54 L68 72 L56 68 L46 58 Z" fill="${color}" opacity="0.68"/>
    <path d="M36 6 L50 46 L50 72 L36 82 L22 72 L22 46 Z" fill="${color}"/>
    <path d="M36 6 L42 30 L36 26 L30 30 Z" fill="rgba(255,255,255,0.22)"/>
    <ellipse cx="36" cy="36" rx="9" ry="13" fill="rgba(255,255,255,0.08)"/>
    <ellipse cx="36" cy="35" rx="5" ry="8"  fill="rgba(255,255,255,0.16)"/>
    <rect x="24" y="60" width="9" height="17" rx="4.5" fill="${color}" opacity="0.82"/>
    <rect x="39" y="60" width="9" height="17" rx="4.5" fill="${color}" opacity="0.82"/>
    <ellipse cx="28.5" cy="77" rx="4" ry="2.5" fill="rgba(255,255,255,0.4)"/>
    <ellipse cx="43.5" cy="77" rx="4" ry="2.5" fill="rgba(255,255,255,0.4)"/>
  </svg>`;
}

function renderFeatCard() {
  const c = COLORS[0], r = COLORSR[0], t = types()[0];
  const isHost = st.isHost;
  document.getElementById('feat-wrap').innerHTML =
    `<div class="feat-card" style="--pc:${c};--pcr:${r}">
      <div class="feat-ambient"></div>
      <div class="feat-slot">P1</div>
      <div class="feat-typebadge">${BICO[t]}${BLBL[t]}</div>
      <div class="feat-ship-area">
        <div class="feat-ship-glow"></div>
        ${shipSVG(c, 88, 110)}
      </div>
      <div class="feat-info">
        <div class="feat-name">${NAMES[0]}</div>
        <div class="feat-role">${ROLE[t]}</div>
        <div class="feat-foot">
          ${isHost?'<span class="host-badge"><svg viewBox="0 0 24 24" fill="currentColor" width="8" height="8"><path d="M5 19h14l1-9-4.5 3.5L12 6 8.5 13.5 4 10l1 9z"/></svg>Host</span>':''}
        </div>
      </div>
    </div>`;
}

function renderOppRows() {
  const ts = types(); let html = '';
  for (let i = 1; i < 4; i++) {
    const c = COLORS[i], r = COLORSR[i];
    if (i < st.cnt) {
      const t = ts[i]||'online', canAct = st.isHost;
      html += `<div class="opp-row" style="--pc:${c};--pcr:${r}">
        <div class="opp-row-ambient"></div>
        <div class="opp-vp" style="border-color:${c};box-shadow:0 0 14px rgba(${r},0.22)">${shipSVG(c,38,48)}</div>
        <div class="opp-info">
          <div class="opp-name">${NAMES[i]}</div>
          <div class="opp-role">${ROLE[t]}</div>
          <div class="opp-foot">
            <span class="opp-tbadge" style="background:rgba(${r},0.12);border-color:rgba(${r},0.25);color:${c}">${BICO[t]}${BLBL[t]}</span>
            <span class="opp-slot">${SLOTS[i]}</span>
          </div>
        </div>
        ${canAct?`<button class="opp-act">${t==='ai'||t==='local'?'Remove':'Kick'}</button>`:''}
      </div>`;
    } else {
      const can = st.isHost, loc = st.sess==='local';
      html += `<div class="opp-empty">
        <div class="oe-plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
        <span class="oe-slot">${SLOTS[i]} — Empty</span>
        <div class="oe-btns">
          <button class="oe-btn" ${can?'':'disabled'}>+ Add AI</button>
          ${loc?`<button class="oe-btn" ${can?'':'disabled'}>+ Local</button>`:''}
        </div>
      </div>`;
    }
  }
  document.getElementById('opp-rows').innerHTML = html;
}

/* map draw — synthwave palette */
function ca(ctx,w,h){ctx.fillStyle='#050010';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(255,0,102,0.06)';ctx.lineWidth=1;const s=Math.min(w,h)/6;for(let x=s;x<w;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}for(let y=s;y<h;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}ctx.strokeStyle='rgba(255,0,102,0.18)';ctx.lineWidth=1;ctx.strokeRect(1.5,1.5,w-3,h-3);}
function mRot(ctx,w,h){ca(ctx,w,h);const cx=w/2,cy=h/2,r=Math.min(w,h)*.3;ctx.strokeStyle='rgba(255,0,102,0.28)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(cx,cy,r*.5,0,Math.PI*2);ctx.stroke();for(let i=0;i<8;i++){const a=i/8*Math.PI*2;ctx.fillStyle=`rgba(255,0,102,${.1+i*.04})`;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,2,0,Math.PI*2);ctx.fill();}ctx.fillStyle='rgba(255,0,102,0.15)';ctx.font=`bold ${Math.min(w,h)*.2}px Orbitron,monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',cx,cy+2);}
function mCache(ctx,w,h){ca(ctx,w,h);ctx.fillStyle='rgba(255,150,0,0.38)';const bw=w*.13,bh=h*.19;[[.08,.12],[.79,.12],[.08,.69],[.79,.69]].forEach(([x,y])=>ctx.fillRect(x*w,y*h,bw,bh));ctx.fillRect(w*.36,h*.08,w*.28,h*.1);ctx.fillRect(w*.36,h*.82,w*.28,h*.1);const s=Math.min(w,h)*.065,cx=w/2,cy=h/2;ctx.strokeStyle='rgba(255,0,200,0.5)';ctx.lineWidth=1.5;ctx.strokeRect(cx-s,cy-s,s*2,s*2);ctx.fillStyle='rgba(255,0,200,0.35)';ctx.beginPath();ctx.arc(cx,cy,s*.5,0,Math.PI*2);ctx.fill();}
function mFort(ctx,w,h){ca(ctx,w,h);ctx.fillStyle='rgba(255,0,102,0.22)';const fw=w*.15,fh=h*.22;[[.04,.04],[.81,.04],[.04,.74],[.81,.74]].forEach(([x,y])=>ctx.fillRect(x*w,y*h,fw,fh));ctx.fillStyle='rgba(255,0,102,0.08)';const pw=w*.22,ph=h*.22;ctx.fillRect(w/2-pw/2,h/2-ph/2,pw,ph);ctx.strokeStyle='rgba(255,0,102,0.2)';ctx.lineWidth=1;ctx.strokeRect(w/2-pw/2,h/2-ph/2,pw,ph);}
function mVoid(ctx,w,h){ca(ctx,w,h);const cx=w/2,cy=h/2,r=Math.min(w,h)*.19;const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.4);g.addColorStop(0,'rgba(0,0,0,0.92)');g.addColorStop(.55,'rgba(153,0,255,0.45)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r*1.6,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(153,0,255,0.5)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();}
function mCross(ctx,w,h){ca(ctx,w,h);ctx.fillStyle='rgba(255,0,102,0.15)';ctx.fillRect(0,h*.36,w,h*.28);ctx.fillRect(w*.4,0,w*.2,h);ctx.fillStyle='rgba(255,60,0,0.22)';[[0,0,.12,.36],[.88,0,.12,.36],[0,.64,.12,.36],[.88,.64,.12,.36]].forEach(([x,y,ww,hh])=>ctx.fillRect(x*w,y*h,ww*w,hh*h));}
function mAst(ctx,w,h){ca(ctx,w,h);ctx.fillStyle='rgba(180,100,80,0.42)';[{x:.15,y:.2,r:.065},{x:.8,y:.28,r:.055},{x:.28,y:.72,r:.075},{x:.68,y:.76,r:.06},{x:.5,y:.22,r:.045},{x:.18,y:.52,r:.05},{x:.76,y:.52,r:.065}].forEach(a=>{ctx.beginPath();ctx.arc(a.x*w,a.y*h,Math.min(w,h)*a.r,0,Math.PI*2);ctx.fill();});}

function renderMap(){const c=document.getElementById('mthumb');c.width=110;c.height=72;MAPS[st.map].f(c.getContext('2d'),110,72);document.getElementById('mname').textContent=MAPS[st.map].n;document.getElementById('mdesc').textContent=MAPS[st.map].d;}
function renderMode(){document.getElementById('mval').textContent=MODES[st.mode];}
function renderStatus(){const d=document.getElementById('sdot'),t=document.getElementById('stxt'),b=document.getElementById('lbtn');if(st.cnt>=2){d.className='sdot';t.textContent=st.isHost?'Ready':'Waiting';b.disabled=false;}else{d.className='sdot w';t.textContent='Need more players';b.disabled=true;}b.innerHTML=st.isHost?'<svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><polygon points=\"5,3 19,12 5,21\"/></svg>Launch':'<svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><polygon points=\"5,3 19,12 5,21\"/></svg>Ready';}
function renderTopbar(){document.getElementById('sgl').classList.toggle('on',st.sess==='local');document.getElementById('sgo').classList.toggle('on',st.sess==='online');document.getElementById('rpill').style.display=st.sess==='online'?'flex':'none';}
function render(){renderFeatCard();renderOppRows();renderMap();renderMode();renderStatus();renderTopbar();}

function openP(){buildG();document.getElementById('mbg').classList.add('open');document.getElementById('mmod').classList.add('open');}
function closeP(){document.getElementById('mbg').classList.remove('open');document.getElementById('mmod').classList.remove('open');}
function buildG(){const g=document.getElementById('mgrid');if(g.children.length){g.querySelectorAll('.mpc').forEach((c,i)=>c.classList.toggle('sel',i===st.map));return;}g.innerHTML=MAPS.map((m,i)=>`<button class="mpc${i===st.map?' sel':''}" onclick="pickMap(${i})"><canvas id="pg${i}" width="220" height="100"></canvas><div class="mpci"><div class="mpcn">${m.n}</div><div class="mpcd">${m.d}</div></div></button>`).join('');MAPS.forEach((m,i)=>{const c=document.getElementById('pg'+i);m.f(c.getContext('2d'),220,100);});}
function pickMap(i){st.map=i;renderMap();document.getElementById('mgrid').querySelectorAll('.mpc').forEach((c,j)=>c.classList.toggle('sel',j===i));closeP();}

function cycleM(){st.mode=(st.mode+1)%MODES.length;renderMode();}
function togHost(){st.isHost=!st.isHost;document.getElementById('dh').classList.toggle('on',st.isHost);render();}
function setCnt(n){st.cnt=n;['d4','d3','d2','d1'].forEach(id=>document.getElementById(id).classList.remove('on'));document.getElementById('d'+n).classList.add('on');render();}
function setSess(s){st.sess=s;document.getElementById('dl').classList.toggle('on',s==='local');document.getElementById('dol').classList.toggle('on',s==='online');render();}
function quickMap(){st.map=(st.map+1)%MAPS.length;renderMap();const g=document.getElementById('mgrid');if(g.children.length){g.querySelectorAll('.mpc').forEach((c,i)=>c.classList.toggle('sel',i===st.map));}}
function quickMode(){st.mode=(st.mode+1)%MODES.length;renderMode();}

function rescale(){const e=document.getElementById('stage');const s=Math.min(window.innerWidth/1280,window.innerHeight/720);const ox=(window.innerWidth-1280*s)/2,oy=(window.innerHeight-720*s)/2;e.style.transform=`translate(${ox}px,${oy}px) scale(${s})`;}
window.addEventListener('resize',rescale);rescale();render();
</script>
</body>
</html>
