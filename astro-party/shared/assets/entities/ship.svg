<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 40 40" role="img" aria-label="Ship (vertical squash)">
  <defs>
    <style>
      .slot-secondary { fill: var(--slot-secondary, #ffffff); }
      .slot-stroke { stroke: var(--slot-stroke, #ffffff); }
      .stop-primary { stop-color: var(--slot-primary, #00f0ff); }
      .stop-dark { stop-color: #07121a; }
    </style>

    <linearGradient id="hullGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" class="stop-primary" stop-opacity="1"/>
      <stop offset="0.60" class="stop-primary" stop-opacity="1"/>
      <stop offset="1" class="stop-dark" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" class="stop-primary" stop-opacity="1"/>
      <stop offset="1" class="stop-dark" stop-opacity="1"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" class="stop-primary" stop-opacity="1.0"/>
      <stop offset="45%" class="stop-primary" stop-opacity="0.55"/>
      <stop offset="100%" class="stop-primary" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <metadata id="render-meta">
{
  "trail": {
    "anchor": { "x": -9.2, "y": 0.0 },
    "maxAgeSec": 4.0,
    "startRadius": 10.5,
    "endRadius": 2.2,
    "alpha": 0.48,
    "blur": 14.0,
    "sampleIntervalSec": 0.04,
    "minSampleDistance": 0.7
  }
}
  </metadata>

  <!-- Editor-only guide layer. generate-entity-assets strips this from runtime SVG. -->
  <g id="editor-hardpoints" opacity="0.9">
    <ellipse
      id="hardpoint-shield"
      cx="0"
      cy="0"
      rx="19.2"
      ry="16.1"
      fill="none"
      stroke="#00ff99"
      stroke-width="0.45"
      stroke-dasharray="1.2 1.2"
    />
    <circle
      id="hardpoint-muzzle"
      cx="13.2"
      cy="0"
      r="0.95"
      fill="#ff3366"
      stroke="#ffffff"
      stroke-width="0.25"
    />
    <circle
      id="hardpoint-trail"
      cx="-12.8"
      cy="0"
      r="0.95"
      fill="#33ddff"
      stroke="#ffffff"
      stroke-width="0.25"
    />
    <circle
      id="hardpoint-joust-left"
      cx="-9.8"
      cy="-13.2"
      r="0.95"
      fill="#ffd966"
      stroke="#ffffff"
      stroke-width="0.25"
    />
    <circle
      id="hardpoint-joust-right"
      cx="-9.8"
      cy="13.2"
      r="0.95"
      fill="#ffd966"
      stroke="#ffffff"
      stroke-width="0.25"
    />
  </g>

  <!-- scale(1 0.8) is applied AFTER rotate => squashes screen-vertical -->
  <g id="visual" transform="scale(1 0.8) rotate(90) scale(0.35) translate(-0.25 -4.5)">
    <circle cx="0" cy="30" r="28" fill="url(#coreGlow)"/>

    <polygon
      points="-32.9,27.1 -49.9,22.7 -33.6,10.5 -19.2,23.0"
      fill="url(#wingGrad)"
      class="slot-stroke"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <polygon
      points="36.2,27.1 50.4,23.0 34.3,10.3 19.3,22.4"
      fill="url(#wingGrad)"
      class="slot-stroke"
      stroke-width="3"
      stroke-linejoin="round"
    />

    <polygon
      points="0,-32 37,3 16,18 -16,18 -37,3"
      fill="url(#hullGrad)"
      class="slot-stroke"
      stroke-width="3"
      stroke-linejoin="round"
    />

    <polygon points="0,-22 26,4 0,16" fill="#000" opacity="0.18"/>
    <polygon points="0,-22 -26,4 0,16" fill="#000" opacity="0.10"/>
    <polygon points="-16,18 0,16 16,18 0,10" fill="#000" opacity="0.12"/>

    <polygon points="0,-24 15,-11 0,-7 -15,-11" fill="#07121a" opacity="0.95"/>
    <path class="slot-secondary" d="M -16 -14 L 0 -28 L 16 -14 L 12 -10 L 0 -20 L -12 -10 Z" opacity="1"/>

    <polygon
      points="0,34 13,24 0,14 -13,24"
      fill="var(--slot-primary, #00f0ff)"
      opacity="0.78"
      class="slot-stroke"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <polygon
      points="0,31 9,24 0,17 -9,24"
      fill="var(--slot-primary, #00f0ff)"
      opacity="0.92"
    />
  </g>

  <path
    id="collider"
    d="M 12.775 -0.07 L 0.525 10.29 L -6.475 14.042 L -10.325 -0.07 L -6.37 -14.042 L 0.525 -10.43 Z"
    fill="none"
    stroke="none"
  />
</svg>
