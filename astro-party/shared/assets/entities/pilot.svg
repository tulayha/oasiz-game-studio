<svg xmlns="http://www.w3.org/2000/svg" viewBox="-18 -18 36 36" role="img" aria-label="Astro Party pilot">
  <defs>
    <style>
      .slot-primary { fill: var(--slot-primary, #00f0ff); }
      .slot-secondary { fill: var(--slot-secondary, #f5f5f5); }
      .slot-tertiary { fill: var(--slot-tertiary, #d6d6d6); }
      .slot-outline { fill: var(--slot-outline, #ffffff); }
    </style>
  </defs>

  <g id="visual" transform="translate(0 0)">
    <!-- Backpack -->
    <rect class="slot-tertiary" x="-12.4" y="-3.8" width="4.2" height="7.6" rx="1.2" ry="1.2" />

    <!-- Suit body -->
    <path
      class="slot-primary"
      d="M -10 -4.8 L 2.8 -4.8 Q 3.9 -4.8 4.6 -3.9 L 5.4 -2.6 L 5.4 2.6 L 4.6 3.9 Q 3.9 4.8 2.8 4.8 L -10 4.8 Q -11.2 4.8 -11.2 3.6 L -11.2 -3.6 Q -11.2 -4.8 -10 -4.8 Z"
    />

    <!-- Helmet -->
    <circle class="slot-secondary" cx="7.6" cy="0" r="4.8" />

    <!-- Bright front visor marker for direction -->
    <path class="slot-outline" d="M 6 -2.2 L 9.6 0 L 6 2.2 Z" />

    <!-- Suit seam -->
    <rect class="slot-tertiary" x="-3.2" y="-3.4" width="1.8" height="6.8" rx="0.8" ry="0.8" />
  </g>

  <!-- Canonical collider path for extractor tooling -->
  <path
    id="collider"
    d="M -12.4 -3.8 L -11.2 -4.8 L 2.8 -4.8 L 4.8 -4.4 L 7.6 -4.8 L 10.2 -4 L 12 -2.2 L 12.4 0 L 12 2.2 L 10.2 4 L 7.6 4.8 L 4.8 4.4 L 2.8 4.8 L -11.2 4.8 L -12.4 3.8 Z"
    fill="none"
    stroke="none"
  />
</svg>
