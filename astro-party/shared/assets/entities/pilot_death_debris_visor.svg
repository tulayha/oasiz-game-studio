    </g>
    <circle cx="1.3" cy="-1.3" r="0.6" fill="#eaf9ff" opacity="0.28"/>
  </g>

  <path
    id="collider"
    d="M 0 -3.4 L 2.4 -2.4 L 3.4 0 L 2.4 2.4 L 0 3.4 L -2.4 2.4 L -3.4 0 L -2.4 -2.4 Z"
