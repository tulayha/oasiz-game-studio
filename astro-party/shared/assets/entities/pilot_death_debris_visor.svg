        fill="none"
        stroke="#eaf9ff"
        stroke-width="0.22"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <path
        d="M -0.5 -0.4 L -1.1 0.2 L -1.7 0.4"
        fill="none"
        stroke="#d6f5ff"
        stroke-width="0.16"
        stroke-linecap="round"
      />
      <path
        d="M -0.2 0.5 L 0.4 0.0 L 1.0 -0.1"
        fill="none"
        stroke="#d6f5ff"
        stroke-width="0.16"
        stroke-linecap="round"
      />
      <path
        d="M 0.6 1.2 L 0.2 1.8"
        fill="none"
        stroke="#d6f5ff"
        stroke-width="0.14"
