<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -8 16 16" role="img" aria-label="Pilot death debris visor">
  <defs>
    <style>
      .slot-stroke { stroke: var(--slot-stroke, #e8f5ff); }
    </style>
    <clipPath id="visorCrackClip">
      <circle cx="0" cy="0" r="2.95"/>
    </clipPath>
  </defs>

  <g id="visual">
    <circle
      cx="0"
      cy="0"
      r="3.2"
      fill="var(--slot-secondary, #0b1120)"
      class="slot-stroke"
      stroke-width="0.8"
    />
    <ellipse
      cx="1.2"
      cy="-0.2"
      rx="2.3"
      ry="1.5"
      fill="var(--slot-primary, #00f0ff)"
      opacity="0.28"
    />
    <g clip-path="url(#visorCrackClip)" opacity="0.62">
      <path
