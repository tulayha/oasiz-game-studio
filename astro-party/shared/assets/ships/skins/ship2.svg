<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 40 40" role="img" aria-label="Ship skin: Chrome Angular">

  <defs>

    <style>

      .outline {
        stroke: var(--slot-stroke, #041018);
        stroke-width: 3.8;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      .hull-main { fill: var(--slot-primary, #00f0ff); }
      .hull-shadow {
        fill: #000;
        opacity: 0.22;
      }
      .hull-deep {
        fill: #000;
        opacity: 0.38;
      }

      .wing-main { fill: var(--slot-primary, #00f0ff); }
      .wing-shadow {
        fill: #000;
        opacity: 0.22;
      }

      .rim-light { fill: var(--slot-secondary, #ffffff); }
      .rim-soft { fill: var(--slot-secondary, #b8f7ff); }

      .panel {
        fill: #000;
        opacity: 0.12;
      }

      .accent {
        fill: var(--slot-secondary, #ffffff);
        opacity: 0.85;
      }
      .accent-hot {
        fill: var(--slot-secondary, #ffffff);
        opacity: 0.95;
      }

      .engine-core { fill: var(--slot-primary, #00f0ff); }
      .engine-hot { fill: #ffffff; }
      .engine-shadow {
        fill: #000;
        opacity: 0.25;
      }

      .glow { fill: var(--slot-primary, #00f0ff); opacity: 0.22; }

    </style>

  </defs>


  <g id="visual"
     transform="scale(1 0.8) rotate(90) scale(0.35) translate(-0.25 -4.5)">

    <!-- glow -->
    <circle cx="0" cy="30" r="28" class="glow"/>


    <!-- LEFT WING -->

    <polygon
      points="-32.9,27.1 -49.9,22.7 -33.6,10.5 -19.2,23.0"
      data-role="wing-left"
      class="wing-main outline"/>

    <polygon
      points="-33.6,10.5 -49.9,22.7 -33.6,18.0 -21.0,22.0"
      class="wing-shadow"/>

    <!-- rim light -->
    <polygon
      points="-49.9,22.7 -46,21.5 -32.5,11.5 -33.6,10.5"
      class="rim-soft"/>


    <!-- RIGHT WING -->

    <polygon
      points="36.2,27.1 50.4,23.0 34.3,10.3 19.3,22.4"
      data-role="wing-right"
      class="wing-main outline"/>

    <polygon
      points="34.3,10.3 50.4,23.0 34.3,18.0 22.0,22.0"
      class="wing-shadow"/>

    <polygon
      points="50.4,23.0 47,21.8 33.3,11.5 34.3,10.3"
      class="rim-soft"/>


    <!-- MAIN HULL -->

    <polygon
      points="0,-32 37,3 16,18 -16,18 -37,3"
      data-role="hull-main"
      class="hull-main outline"/>

    <!-- main shadow split -->
    <polygon
      points="0,-32 37,3 16,18 0,14"
      class="hull-shadow"/>

    <!-- deep shadow -->
    <polygon
      points="0,-32 -37,3 -16,18 0,14"
      class="hull-deep"/>


    <!-- rim light edge -->
    <polygon
      points="0,-32 6,-26 0,-22 -6,-26"
      class="rim-light"/>


    <!-- cockpit aggressive visor -->

    <polygon
      points="0,-25 16,-11 0,-6 -16,-11"
      fill="#02141c"
      class="outline"
      stroke-width="2.5"/>


    <!-- visor glow strip -->
    <polygon
      points="-10,-12 0,-18 10,-12 7,-10 0,-15 -7,-10"
      class="accent"/>


    <!-- PANEL DETAIL LEFT -->
    <polygon
      points="-16,5 -6,2 -4,8 -14,10"
      class="panel"/>

    <!-- PANEL DETAIL RIGHT -->
    <polygon
      points="16,5 6,2 4,8 14,10"
      class="panel"/>


    <!-- CENTER ACCENT STRIPE -->
    <polygon
      points="-3,-12 3,-12 2,16 -2,16"
      class="accent-hot"/>


    <!-- ENGINE BODY -->
    <polygon
      points="0,34 13,24 0,14 -13,24"
      class="engine-core outline"/>

    <!-- ENGINE SHADOW -->
    <polygon
      points="0,31 9,24 0,18 -9,24"
      class="engine-shadow"/>

    <!-- ENGINE HOT CORE -->
    <polygon
      points="0,28 5,24 0,20 -5,24"
      class="engine-hot"/>


    <!-- ENGINE FLARE -->
    <polygon
      points="-6,34 0,46 6,34"
      class="accent-hot"/>

  </g>


  <!-- collider unchanged -->

  <path
    id="collider"
    d="M 12.775 -0.07 L 0.525 10.29 L -6.475 14.042 L -10.325 -0.07 L -6.37 -14.042 L 0.525 -10.43 Z"
    fill="none"/>

</svg>
