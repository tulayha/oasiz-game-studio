<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Stone Ascent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #0a0a0f;
      font-family: 'Cinzel', serif;
      user-select: none;
      -webkit-user-select: none;
    }

    #game {
      display: block;
      position: absolute;
      top: 0; left: 0;
      cursor: none;
    }

    /* ── Overlays ─────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .overlay.hidden { display: none; }

    /* ── Start Screen ─────────────────────────────────────────── */
    #start-screen {
      background: linear-gradient(170deg, #0d1117 0%, #1a1206 40%, #0f0d09 100%);
      overflow: hidden;
    }

    .start-bg-rocks {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .start-title-wrap {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 1rem;
    }

    .start-title {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 8vw, 5rem);
      color: #c8a96e;
      text-shadow:
        0 0 30px rgba(200, 169, 110, 0.4),
        2px 3px 0 #3a2a10,
        4px 6px 0 #1a1008;
      letter-spacing: 0.05em;
      animation: titlePulse 3s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 30px rgba(200,169,110,0.4), 2px 3px 0 #3a2a10, 4px 6px 0 #1a1008; }
      50%       { text-shadow: 0 0 60px rgba(200,169,110,0.7), 2px 3px 0 #3a2a10, 4px 6px 0 #1a1008; }
    }

    .start-subtitle {
      font-size: clamp(0.75rem, 2vw, 1rem);
      color: #7a6a4a;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .start-canvas-wrap {
      margin: 1.8rem auto;
      width: clamp(160px, 40vw, 260px);
      height: clamp(160px, 40vw, 260px);
    }

    #start-preview {
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(200, 169, 110, 0.3);
      box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(200,169,110,0.05);
    }

    .start-instructions {
      font-size: clamp(0.7rem, 1.8vw, 0.9rem);
      color: #6a5a3a;
      text-align: center;
      margin-bottom: 1.8rem;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }
    .start-instructions span {
      color: #a88a50;
    }

    .start-btn {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      letter-spacing: 0.15em;
      padding: 1rem 3rem;
      background: linear-gradient(180deg, #c8a96e 0%, #8a6a30 100%);
      color: #0d0905;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      z-index: 2;
      box-shadow: 0 4px 0 #3a2a10, 0 8px 20px rgba(0,0,0,0.6);
      transition: all 0.15s;
      animation: btnGlow 2.5s ease-in-out infinite;
    }
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 4px 0 #3a2a10, 0 8px 20px rgba(0,0,0,0.6); }
      50%       { box-shadow: 0 4px 0 #3a2a10, 0 8px 40px rgba(200,169,110,0.3), 0 0 60px rgba(200,169,110,0.15); }
    }
    .start-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 #3a2a10, 0 12px 30px rgba(0,0,0,0.7); animation: none; }
    .start-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #3a2a10, 0 4px 10px rgba(0,0,0,0.6); animation: none; }

    /* ── HUD ──────────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 55px;
    }
    #hud.hidden { display: none; }
    @media (pointer: coarse) { #hud { padding-top: 130px; } }

    .hud-box {
      background: rgba(5, 4, 2, 0.7);
      border: 1px solid rgba(200, 169, 110, 0.25);
      border-radius: 4px;
      padding: 0.4rem 1.2rem;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .hud-height {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      color: #c8a96e;
      line-height: 1.1;
    }

    .hud-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: #5a4a2a;
      text-transform: uppercase;
    }

    .hud-max {
      font-size: 0.75rem;
      color: #7a6a4a;
      margin-top: 0.15rem;
    }

    /* ── Settings Button ──────────────────────────────────────── */
    #settings-btn {
      position: fixed;
      top: 45px; right: 16px;
      width: 44px; height: 44px;
      background: rgba(5, 4, 2, 0.75);
      border: 1px solid rgba(200, 169, 110, 0.3);
      border-radius: 6px;
      cursor: pointer;
      z-index: 15;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
    }
    #settings-btn.hidden { display: none; }
    #settings-btn:hover { background: rgba(20, 14, 5, 0.9); }
    @media (pointer: coarse) { #settings-btn { top: 120px; } }

    .gear-icon {
      width: 22px; height: 22px;
      fill: #c8a96e;
    }

    /* ── Quit Button ──────────────────────────────────────────── */
    #quit-btn {
      position: fixed;
      top: 45px; left: 16px;
      background: rgba(5, 4, 2, 0.75);
      border: 1px solid rgba(200, 169, 110, 0.2);
      border-radius: 6px;
      color: #7a6a4a;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      padding: 0.5rem 0.8rem;
      cursor: pointer;
      z-index: 15;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    #quit-btn.hidden { display: none; }
    #quit-btn:hover { color: #c8a96e; border-color: rgba(200,169,110,0.4); }
    @media (pointer: coarse) { #quit-btn { top: 120px; } }

    /* ── Settings Modal ───────────────────────────────────────── */
    #settings-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
    }
    #settings-modal.hidden { display: none; }

    .settings-panel {
      background: linear-gradient(170deg, #1a1510 0%, #100d08 100%);
      border: 1px solid rgba(200, 169, 110, 0.3);
      border-radius: 8px;
      padding: 2rem;
      width: clamp(260px, 80vw, 340px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }

    .settings-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      color: #c8a96e;
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.1rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid rgba(200, 169, 110, 0.1);
    }
    .settings-row:last-of-type { border-bottom: none; margin-bottom: 1.5rem; }

    .settings-row-label {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      color: #a89060;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .settings-row-label svg {
      width: 18px; height: 18px;
      fill: #c8a96e;
    }

    .toggle {
      width: 48px; height: 26px;
      background: #1e1a12;
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 13px;
      cursor: pointer;
      position: relative;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #5a4a2a;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle.active { background: rgba(200,169,110,0.25); border-color: #c8a96e; }
    .toggle.active::after { transform: translateX(22px); background: #c8a96e; }

    .settings-close {
      width: 100%;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      padding: 0.75rem;
      background: linear-gradient(180deg, #c8a96e 0%, #8a6a30 100%);
      color: #0d0905;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #3a2a10;
    }
    .settings-close:hover  { transform: translateY(-1px); }
    .settings-close:active { transform: translateY(1px); box-shadow: 0 1px 0 #3a2a10; }

    /* ── Quit / Results Screen ────────────────────────────────── */
    #quit-screen {
      background: linear-gradient(170deg, #0d1117 0%, #1a1206 40%, #0f0d09 100%);
    }

    .quit-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      color: #c8a96e;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .quit-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: #5a4a2a;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .quit-height-display {
      font-size: clamp(3.5rem, 14vw, 6rem);
      font-weight: 700;
      color: #c8a96e;
      text-shadow: 0 0 40px rgba(200,169,110,0.4);
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .quit-height-unit {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #8a7a5a;
      margin-bottom: 2.5rem;
    }

    .quit-btn-row {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: clamp(200px, 50vw, 280px);
    }

    .play-again-btn {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.15em;
      padding: 0.9rem 2rem;
      background: linear-gradient(180deg, #c8a96e 0%, #8a6a30 100%);
      color: #0d0905;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 4px 0 #3a2a10;
      transition: all 0.15s;
    }
    .play-again-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 #3a2a10; }
    .play-again-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #3a2a10; }

    /* ── Height milestone toast ───────────────────────────────── */
    #milestone-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(5, 4, 2, 0.92);
      border: 1px solid rgba(200, 169, 110, 0.5);
      border-radius: 6px;
      padding: 0.8rem 2rem;
      text-align: center;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      backdrop-filter: blur(8px);
    }
    #milestone-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .toast-height {
      font-size: 1.6rem;
      font-weight: 700;
      color: #c8a96e;
    }
    .toast-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: #8a7a5a;
      text-transform: uppercase;
    }

    /* ── Custom cursor ────────────────────────────────────────── */
    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: radial-gradient(circle, #c8a96e 30%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>

  <canvas id="game"></canvas>

  <!-- Custom cursor -->
  <div id="cursor"></div>

  <!-- Height milestone toast -->
  <div id="milestone-toast">
    <div class="toast-height" id="toast-height">25m</div>
    <div class="toast-label">New Height Record</div>
  </div>

  <!-- ── Start Screen ──────────────────────────────────────── -->
  <div id="start-screen" class="overlay">
    <div class="start-bg-rocks" id="start-bg-rocks"></div>

    <div class="start-title-wrap">
      <div class="start-title">Stone Ascent</div>
      <div class="start-subtitle">Getting Over It — With a Pickaxe</div>
    </div>

    <div class="start-canvas-wrap">
      <canvas id="start-preview"></canvas>
    </div>

    <div class="start-instructions">
      <span>Move</span> the pickaxe to grip the rocks<br>
      <span>Swing</span> your body to climb<br>
      <span>Every fall</span> is part of the journey
    </div>

    <button class="start-btn" id="start-btn">BEGIN THE ASCENT</button>
  </div>

  <!-- ── HUD ──────────────────────────────────────────────── -->
  <div id="hud" class="hidden">
    <div class="hud-box">
      <div class="hud-height" id="hud-height">0m</div>
      <div class="hud-label">altitude</div>
      <div class="hud-max" id="hud-max">Best: 0m</div>
    </div>
  </div>

  <!-- ── Settings Button ──────────────────────────────────── -->
  <button id="settings-btn" class="hidden" aria-label="Settings">
    <svg class="gear-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.73-.07-1.08l2.33-1.81c.21-.16.27-.46.13-.7l-2.21-3.82c-.13-.25-.43-.33-.67-.25l-2.76 1.1c-.57-.44-1.18-.81-1.86-1.09L14 2.42C13.95 2.17 13.72 2 13.46 2H10.54c-.26 0-.49.17-.54.42l-.42 2.94c-.68.28-1.29.65-1.86 1.09L4.96 5.35c-.24-.09-.54-.01-.67.25L2.08 9.42c-.14.24-.08.54.13.7l2.33 1.81C4.5 12.27 4.47 12.63 4.47 13s.03.73.07 1.08L2.21 15.89c-.21.16-.27.46-.13.7l2.21 3.82c.13.25.43.33.67.25l2.76-1.1c.57.44 1.18.81 1.86 1.09l.42 2.94c.05.25.28.42.54.42h2.92c.26 0 .49-.17.54-.42l.42-2.94c.68-.28 1.29-.65 1.86-1.09l2.76 1.1c.24.09.54.01.67-.25l2.21-3.82c.14-.24.08-.54-.13-.7l-2.33-1.81Z"/>
    </svg>
  </button>

  <!-- ── Quit Button ───────────────────────────────────────── -->
  <button id="quit-btn" class="hidden">END SESSION</button>

  <!-- ── Settings Modal ───────────────────────────────────── -->
  <div id="settings-modal" class="hidden">
    <div class="settings-panel">
      <div class="settings-title">Settings</div>

      <div class="settings-row">
        <div class="settings-row-label">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z"/></svg>
          Music
        </div>
        <div class="toggle active" id="music-toggle" role="switch" aria-checked="true"></div>
      </div>

      <div class="settings-row">
        <div class="settings-row-label">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          Sound FX
        </div>
        <div class="toggle active" id="fx-toggle" role="switch" aria-checked="true"></div>
      </div>

      <div class="settings-row">
        <div class="settings-row-label">
          <svg viewBox="0 0 24 24"><path d="M17 1.01 7 1c-1.1 0-1.99.9-1.99 2v18c0 1.1.89 2 1.99 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
          Haptics
        </div>
        <div class="toggle active" id="haptics-toggle" role="switch" aria-checked="true"></div>
      </div>

      <button class="settings-close" id="settings-close">DONE</button>
    </div>
  </div>

  <!-- ── Results / Quit Screen ────────────────────────────── -->
  <div id="quit-screen" class="overlay hidden">
    <div class="quit-title">Session Complete</div>
    <div class="quit-label">Maximum Altitude Reached</div>
    <div class="quit-height-display" id="final-height">0</div>
    <div class="quit-height-unit">meters</div>
    <div class="quit-btn-row">
      <button class="play-again-btn" id="play-again-btn">ASCEND AGAIN</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
