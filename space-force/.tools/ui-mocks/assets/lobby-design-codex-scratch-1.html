<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Astro Party Lobby Scratch Variant 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; touch-action: none;
      font-family: 'Exo 2', sans-serif;
      background: radial-gradient(circle at 18% 10%, #1e2e5b, transparent 36%), radial-gradient(circle at 86% 85%, #3a1746, transparent 32%), #070b17;
      color: #eaf2ff;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(circle at 12% 22%, rgba(255,255,255,0.42) 0 1px, transparent 1px),
        radial-gradient(circle at 57% 48%, rgba(255,255,255,0.3) 0 1px, transparent 1px),
        radial-gradient(circle at 84% 26%, rgba(255,255,255,0.38) 0 1px, transparent 1px),
        radial-gradient(circle at 26% 84%, rgba(255,255,255,0.25) 0 1px, transparent 1px);
      background-size: 300px 300px;
      opacity: 0.42;
    }
    #stage {
      position: fixed; left: 0; top: 0; width: 1280px; height: 720px;
      transform-origin: top left;
      border: 2px solid #34497a;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(150deg, #0f1737, #0b122a);
      box-shadow: 0 24px 48px rgba(0,0,0,0.45);
    }
    .scene {
      width: 1280px; height: 720px; padding: 24px;
      display: grid;
      grid-template-rows: 78px 1fr 208px;
      gap: 16px;
    }
    .topbar {
      border: 2px solid #3b4f85; border-radius: 14px;
      background: linear-gradient(180deg, #1b2554, #121a3f);
      display: flex; align-items: center; gap: 14px; padding: 0 18px;
    }
    .title {
      font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      text-shadow: 0 0 16px rgba(0,229,255,0.4);
    }
    .room-pill {
      margin-left: auto;
      min-height: 42px;
      border: 2px solid #4860a1; border-radius: 999px; padding: 0 14px;
      display: flex; align-items: center; gap: 8px; background: #10183b;
    }
    .room-pill.hidden { visibility: hidden; }
    .room-label { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 0.1em; color: #9bb2e9; text-transform: uppercase; }
    .room-code { font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 0.11em; color: #00e5ff; }
    .top-btn {
      min-height: 40px; border: 2px solid #4b61a0; border-radius: 10px; padding: 0 14px;
      background: #253668; color: #ecf3ff; font-weight: 600; cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }
    .top-btn:hover { transform: translateY(-1px); box-shadow: 0 0 14px rgba(0,229,255,0.3); }
    .top-btn:active { transform: translateY(1px); }
    .leave-btn { border-color: #7d4162; background: #3a1a31; color: #ffc7e0; }

    .players-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 16px;
    }
    .player-card {
      border: 2px solid #334a80; border-radius: 14px;
      background: linear-gradient(150deg, #1e2756, #151d40);
      overflow: hidden;
      display: grid;
      grid-template-rows: 46px 1fr 52px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .player-card.empty { border-style: dashed; opacity: 0.72; background: linear-gradient(150deg, #131b3f, #10162f); }
    .card-head, .card-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .card-foot { border-bottom: none; border-top: 1px solid rgba(255,255,255,0.08); }
    .pname { font-family: 'Orbitron', sans-serif; font-size: 15px; letter-spacing: 0.05em; }
    .host-chip {
      border: 1px solid rgba(43,253,165,0.35); border-radius: 999px; padding: 3px 8px;
      background: rgba(43,253,165,0.15); color: #9bffd7;
      font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
      visibility: hidden;
    }
    .ship-zone { display: flex; align-items: center; justify-content: center; position: relative; }
    .ship-aura {
      position: absolute; width: 144px; height: 144px; border-radius: 50%;
      opacity: 0.28; filter: blur(18px); animation: aura 3s ease-in-out infinite;
    }
    .ship {
      width: 118px; height: 82px; position: relative; animation: float 3.5s ease-in-out infinite;
    }
    .ship::before {
      content: ''; position: absolute; inset: 0;
      clip-path: polygon(6% 56%, 28% 22%, 68% 22%, 94% 56%, 70% 82%, 30% 82%);
      border: 3px solid #1a274d; background: linear-gradient(135deg, #e4ebff, #90a7ff);
    }
    .ship::after {
      content: ''; position: absolute; left: 46px; top: 29px;
      width: 26px; height: 26px; border-radius: 50%; border: 3px solid #1d2f5f;
      background: #74f4ff; box-shadow: 0 0 14px rgba(0,229,255,0.62);
    }
    .type-badge {
      border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; padding: 6px 10px;
      font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      background: rgba(255,255,255,0.05);
    }
    .kick-btn {
      min-height: 30px; min-width: 64px; border-radius: 8px;
      border: 1px solid #7f4461; background: #3b1a2f; color: #ffbfd7;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .kick-btn[hidden] { display: none; }

    .bottom {
      display: grid;
      grid-template-columns: 588px 352px 252px;
      gap: 16px;
    }
    .panel {
      border: 2px solid #364b81; border-radius: 14px;
      background: linear-gradient(145deg, #182149, #11183a);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .map-panel { padding: 16px; display: grid; grid-template-columns: 300px 1fr; gap: 14px; }
    #map-main { width: 300px; height: 160px; border-radius: 10px; border: 2px solid #4a64a8; background: #0a112c; }
    .kicker { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 0.11em; color: #a0b5e8; text-transform: uppercase; }
    .map-name { font-family: 'Orbitron', sans-serif; font-size: 22px; letter-spacing: 0.04em; margin: 8px 0; }
    .map-desc { font-size: 14px; line-height: 1.35; color: #bcd0fb; min-height: 56px; }
    .main-btn {
      min-height: 42px; border-radius: 10px; border: 2px solid #4d6db2;
      background: linear-gradient(180deg, #2b3f77, #212f5d);
      color: #eef4ff; font-family: 'Orbitron', sans-serif; letter-spacing: 0.06em; text-transform: uppercase;
      font-size: 13px; cursor: pointer;
    }
    .main-btn:hover { box-shadow: 0 0 14px rgba(0,229,255,0.28); }

    .control-panel { padding: 16px; display: grid; grid-template-rows: auto auto auto; gap: 14px; }
    .line { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .mode-value { font-family: 'Orbitron', sans-serif; font-size: 14px; }
    .session-toggle {
      border: 2px solid #4a5f99; border-radius: 10px; padding: 4px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; min-width: 186px; background: #141d43;
    }
    .session-btn {
      min-height: 34px; border-radius: 8px; border: none; background: transparent; color: #9ab0e4;
      font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    }
    .session-btn.active { background: #2c3f74; color: #f3f7ff; box-shadow: 0 0 12px rgba(0,229,255,0.24); }

    .status {
      min-height: 44px; border: 2px solid #4a6098; border-radius: 10px;
      display: flex; align-items: center; gap: 10px; padding: 0 12px; font-weight: 600;
      background: #121a3d;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ffca45; box-shadow: 0 0 10px #ffca45; animation: pulse 1.4s ease-in-out infinite; }

    .cta-panel { padding: 16px; display: grid; grid-template-rows: auto auto 1fr; gap: 12px; }
    .count-label { font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 0.08em; color: #9db2e6; text-transform: uppercase; }
    .count-value { font-family: 'Orbitron', sans-serif; font-size: 24px; }
    #cta {
      align-self: end; min-height: 64px; border-radius: 12px;
      border: 2px solid #42d6ff; background: linear-gradient(180deg, #2fd5ff, #1f9fca);
      color: #042337; font-family: 'Orbitron', sans-serif; font-size: 25px; letter-spacing: 0.07em; font-weight: 800;
      cursor: pointer; box-shadow: 0 0 22px rgba(0,229,255,0.4);
    }
    #cta:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    .modal {
      position: absolute; inset: 0; visibility: hidden; opacity: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(7,10,20,0.68); transition: opacity 0.18s ease;
    }
    .modal.open { visibility: visible; opacity: 1; }
    .modal-card {
      width: 1040px; height: 560px; border-radius: 16px; border: 2px solid #4961a1;
      background: linear-gradient(150deg, #16204a, #11183a);
      padding: 20px; display: grid; grid-template-rows: 54px 1fr; gap: 12px;
      transform: translateY(8px); transition: transform 0.18s ease;
    }
    .modal.open .modal-card { transform: translateY(0); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-family: 'Orbitron', sans-serif; font-size: 24px; letter-spacing: 0.08em; text-transform: uppercase; }
    .close {
      width: 42px; height: 42px; border-radius: 10px; border: 2px solid #5d76ba;
      background: #26386d; color: #e6eeff; font-size: 19px; cursor: pointer;
    }
    .map-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .map-item {
      border: 2px solid #425696; border-radius: 12px; background: #121b42; padding: 12px;
      display: grid; grid-template-rows: 118px auto auto; gap: 8px; cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .map-item:hover { transform: translateY(-2px); box-shadow: 0 0 14px rgba(0,229,255,0.25); }
    .map-item.active { border-color: #58ddff; box-shadow: 0 0 18px rgba(0,229,255,0.35); }
    .mini { width: 100%; height: 118px; border-radius: 8px; border: 2px solid #435489; background: #0a1230; }
    .mini-title { font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 0.05em; }
    .mini-desc { font-size: 12px; line-height: 1.3; color: #afc0ea; }

    .toolbar {
      position: fixed; left: 18px; bottom: 18px; z-index: 8;
      width: 368px; border-radius: 12px; border: 2px solid #50659e;
      background: rgba(9,14,31,0.94); padding: 12px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.35);
      font-size: 12px;
    }
    .toolbar-title { grid-column: 1 / -1; font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; }
    .toolbar label { display: grid; gap: 4px; color: #adc0eb; }
    .toolbar input, .toolbar select {
      min-height: 30px; border-radius: 8px; border: 1px solid #5e75ae;
      background: #17254e; color: #ecf2ff; padding: 0 8px;
      font-family: 'Exo 2', sans-serif;
    }

    #portrait-guard {
      position: fixed; inset: 0; display: none; z-index: 12;
      align-items: center; justify-content: center;
      background: rgba(5,7,15,0.95);
      font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; text-align: center;
    }

    @keyframes aura { 0%,100%{ transform: scale(0.9); opacity: 0.2; } 50%{ transform: scale(1.1); opacity: 0.34; } }
    @keyframes float { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-6px); } }
    @keyframes pulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.35); opacity: 0.6; } }
  </style>
</head>
<body>
  <div id="stage">
    <div class="scene">
      <header class="topbar">
        <h1 class="title">Astro Party Lobby</h1>
        <div id="room-pill" class="room-pill"><span class="room-label">Room</span><span id="room-code" class="room-code">AX7K</span></div>
        <button id="copy-btn" class="top-btn" type="button">Copy</button>
        <button class="top-btn leave-btn" type="button">Leave</button>
      </header>

      <section id="players" class="players-grid"></section>

      <section class="bottom">
        <article class="panel map-panel">
          <canvas id="map-main" width="300" height="160"></canvas>
          <div>
            <p class="kicker">Map Selector</p>
            <h2 id="map-name" class="map-name"></h2>
            <p id="map-desc" class="map-desc"></p>
            <button id="open-map" class="main-btn" type="button">Change Arena</button>
          </div>
        </article>

        <article class="panel control-panel">
          <div class="line"><span class="kicker">Game Mode</span><button id="cycle-mode" class="main-btn" type="button"><span id="mode-value" class="mode-value"></span></button></div>
          <div class="line"><span class="kicker">Session</span><div class="session-toggle"><button id="session-local" class="session-btn" type="button">Local</button><button id="session-online" class="session-btn" type="button">Online</button></div></div>
          <div class="status"><span id="status-dot" class="dot"></span><span id="status-text">Waiting</span></div>
        </article>

        <article class="panel cta-panel">
          <p class="count-label">Roster</p>
          <p class="count-value"><span id="count-now"></span> / 4</p>
          <button id="cta" type="button">Launch</button>
        </article>
      </section>
    </div>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true">
        <div class="modal-head"><h3 class="modal-title">Select Arena</h3><button id="close-modal" class="close" type="button">X</button></div>
        <div id="map-grid" class="map-grid"></div>
      </div>
    </div>
  </div>

  <aside class="toolbar" aria-label="Dev toolbar">
    <p class="toolbar-title">Dev Toolbar</p>
    <label>Player Count<input id="dev-players" type="range" min="1" max="4" value="1"></label>
    <label>Host<input id="dev-host" type="checkbox" checked></label>
    <label>Session<select id="dev-session"><option value="local">Local</option><option value="online" selected>Online</option></select></label>
    <label>Quick Map<select id="dev-map"></select></label>
    <label>Quick Mode<select id="dev-mode"></select></label>
  </aside>

  <div id="portrait-guard">Landscape Only<br>Astro Party Lobby</div>

  <script>
    (function () {
      const baseW = 1280;
      const baseH = 720;
      const colors = ['#00e5ff', '#ff2d9b', '#ffe500', '#00ff88'];
      const modes = ['Standard', 'Sane', 'Chaotic'];
      const maps = [
        { name: 'Classic Rotation', desc: 'Balanced arena with lane loops and mirrored starts.' },
        { name: 'The Cache', desc: 'Central vault pull with guarded corner entries.' },
        { name: 'Fortress', desc: 'Hard cover blocks around controlled breach routes.' },
        { name: 'Void Ring', desc: 'Outer dueling ring around a hazardous center.' },
        { name: 'Nebula Cross', desc: 'Cross-lane pressure with shifting visibility zones.' },
        { name: 'Asteroid Field', desc: 'Dense hazards reward micro-thrust precision.' }
      ];
      const asteroids = [[0.12,0.25,0.04],[0.24,0.61,0.05],[0.40,0.35,0.03],[0.53,0.52,0.06],[0.66,0.2,0.04],[0.74,0.68,0.05],[0.85,0.41,0.04],[0.45,0.78,0.03]];
      const state = { playerCount: 1, isHost: true, session: 'online', mapIndex: 0, modeIndex: 0, ready: false, roomCode: 'AX7K' };

      const ids = {
        stage: document.getElementById('stage'), portrait: document.getElementById('portrait-guard'), players: document.getElementById('players'),
        roomPill: document.getElementById('room-pill'), roomCode: document.getElementById('room-code'), mapMain: document.getElementById('map-main'),
        mapName: document.getElementById('map-name'), mapDesc: document.getElementById('map-desc'), modeValue: document.getElementById('mode-value'),
        sessionLocal: document.getElementById('session-local'), sessionOnline: document.getElementById('session-online'),
        statusText: document.getElementById('status-text'), statusDot: document.getElementById('status-dot'), countNow: document.getElementById('count-now'), cta: document.getElementById('cta'),
        modal: document.getElementById('modal'), mapGrid: document.getElementById('map-grid'),
        devPlayers: document.getElementById('dev-players'), devHost: document.getElementById('dev-host'), devSession: document.getElementById('dev-session'), devMap: document.getElementById('dev-map'), devMode: document.getElementById('dev-mode')
      };

      function log(fn, message) { console.log('[' + fn + ']', message); }
      function scaleStage() {
        const scale = Math.min(window.innerWidth / baseW, window.innerHeight / baseH);
        const ox = (window.innerWidth - baseW * scale) * 0.5;
        const oy = (window.innerHeight - baseH * scale) * 0.5;
        ids.stage.style.transform = 'translate(' + ox + 'px,' + oy + 'px) scale(' + scale + ')';
        ids.portrait.style.display = window.innerWidth < window.innerHeight ? 'flex' : 'none';
      }

      function slotType(slot) {
        if (slot === 1) return 'YOU';
        if (slot > state.playerCount) return 'OPEN';
        if (state.session === 'online') return slot === 4 ? 'AI BOT' : 'ONLINE';
        return slot === 4 ? 'AI BOT' : 'LOCAL';
      }

      function slotName(slot) {
        if (slot > state.playerCount) return 'OPEN SLOT';
        if (slot === 1) return 'YOU';
        if (state.session === 'online') return ['YOU', 'NOVA RAZE', 'ORION PIKE', 'ASTRA UNIT'][slot - 1];
        return ['YOU', 'WINGMATE A', 'WINGMATE B', 'DRONE ALLY'][slot - 1];
      }

      function drawMap(canvas, mapIndex) {
        const ctx = canvas.getContext('2d');
        const w = canvas.width; const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        const g = ctx.createLinearGradient(0, 0, w, h); g.addColorStop(0, '#0f1740'); g.addColorStop(1, '#0a112c');
        ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = 'rgba(125,156,255,0.2)'; ctx.lineWidth = 1;
        for (let x = 0; x <= w; x += 24) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
        for (let y = 0; y <= h; y += 24) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
        ctx.strokeStyle = '#96ecff'; ctx.lineWidth = 3; ctx.fillStyle = 'rgba(0,229,255,0.2)';

        if (mapIndex === 0) { ctx.strokeRect(w*0.22,h*0.2,w*0.56,h*0.6); ctx.beginPath(); ctx.arc(w*0.5,h*0.5,h*0.18,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
        if (mapIndex === 1) { ctx.strokeRect(w*0.16,h*0.22,w*0.2,h*0.2); ctx.strokeRect(w*0.64,h*0.22,w*0.2,h*0.2); ctx.strokeRect(w*0.16,h*0.58,w*0.2,h*0.2); ctx.strokeRect(w*0.64,h*0.58,w*0.2,h*0.2); ctx.fillRect(w*0.43,h*0.39,w*0.14,h*0.22); ctx.strokeRect(w*0.43,h*0.39,w*0.14,h*0.22); }
        if (mapIndex === 2) { ctx.strokeRect(w*0.1,h*0.14,w*0.8,h*0.72); ctx.clearRect(w*0.45,h*0.1,w*0.1,h*0.12); ctx.clearRect(w*0.45,h*0.78,w*0.1,h*0.12); ctx.strokeRect(w*0.22,h*0.28,w*0.2,h*0.18); ctx.strokeRect(w*0.58,h*0.54,w*0.2,h*0.18); }
        if (mapIndex === 3) { ctx.beginPath(); ctx.arc(w*0.5,h*0.5,h*0.34,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(w*0.5,h*0.5,h*0.17,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(w*0.5,h*0.16); ctx.lineTo(w*0.5,h*0.84); ctx.stroke(); ctx.beginPath(); ctx.moveTo(w*0.16,h*0.5); ctx.lineTo(w*0.84,h*0.5); ctx.stroke(); }
        if (mapIndex === 4) { ctx.beginPath(); ctx.moveTo(w*0.5,h*0.08); ctx.lineTo(w*0.5,h*0.92); ctx.stroke(); ctx.beginPath(); ctx.moveTo(w*0.08,h*0.5); ctx.lineTo(w*0.92,h*0.5); ctx.stroke(); ctx.fillStyle = 'rgba(144,114,255,0.24)'; ctx.beginPath(); ctx.arc(w*0.34,h*0.38,h*0.18,0,Math.PI*2); ctx.arc(w*0.62,h*0.58,h*0.15,0,Math.PI*2); ctx.fill(); }
        if (mapIndex === 5) { ctx.fillStyle = 'rgba(146,176,255,0.32)'; asteroids.forEach(function (a) { ctx.beginPath(); ctx.arc(w*a[0], h*a[1], h*a[2], 0, Math.PI*2); ctx.fill(); ctx.stroke(); }); }
      }

      function buildPlayers() {
        let html = '';
        for (let i = 1; i <= 4; i += 1) {
          const filled = i <= state.playerCount;
          const role = slotType(i);
          const canKick = state.isHost && i > 1 && filled;
          const kickLabel = role === 'ONLINE' ? 'Kick' : 'Remove';
          html += '<article class="player-card ' + (filled ? '' : 'empty') + '" style="border-color:' + (filled ? colors[i-1] : '#334a80') + '">';
          html += '<div class="card-head"><span class="pname">' + slotName(i) + '</span><span class="host-chip" style="visibility:' + (state.isHost && i===1 ? 'visible' : 'hidden') + '">Host</span></div>';
          html += '<div class="ship-zone"><div class="ship-aura" style="background:' + colors[i-1] + '"></div><div class="ship"></div></div>';
          html += '<div class="card-foot"><span class="type-badge" style="border-color:' + (filled ? colors[i-1] : 'rgba(255,255,255,0.2)') + '">' + role + '</span><button class="kick-btn" ' + (canKick ? '' : 'hidden') + '>' + kickLabel + '</button></div>';
          html += '</article>';
        }
        ids.players.innerHTML = html;
      }

      function buildMapModal() {
        let html = '';
        for (let i = 0; i < maps.length; i += 1) {
          html += '<button class="map-item" data-map="' + i + '"><canvas class="mini" width="292" height="118"></canvas><div class="mini-title">' + maps[i].name + '</div><div class="mini-desc">' + maps[i].desc + '</div></button>';
        }
        ids.mapGrid.innerHTML = html;
        const items = ids.mapGrid.querySelectorAll('.map-item');
        items.forEach(function (item, index) {
          drawMap(item.querySelector('canvas'), index);
          item.addEventListener('click', function () { state.mapIndex = index; renderAll(); closeModal(); log('MapSelect', maps[index].name); });
        });
      }

      function updateStatus() {
        let status = 'Waiting'; let color = '#ffca45';
        if (state.playerCount < 2) { status = 'Need more players'; color = '#ff5f6d'; }
        else if (state.isHost) { status = 'Ready'; color = '#2bfda5'; }
        else { status = state.ready ? 'Ready' : 'Waiting'; color = state.ready ? '#2bfda5' : '#ffca45'; }
        ids.statusText.textContent = status;
        ids.statusDot.style.background = color; ids.statusDot.style.boxShadow = '0 0 10px ' + color;
      }

      function renderAll() {
        buildPlayers();
        ids.mapName.textContent = maps[state.mapIndex].name;
        ids.mapDesc.textContent = maps[state.mapIndex].desc;
        drawMap(ids.mapMain, state.mapIndex);
        ids.modeValue.textContent = modes[state.modeIndex];
        ids.sessionLocal.classList.toggle('active', state.session === 'local');
        ids.sessionOnline.classList.toggle('active', state.session === 'online');
        ids.roomPill.classList.toggle('hidden', state.session !== 'online');
        ids.roomCode.textContent = state.roomCode;
        ids.countNow.textContent = String(state.playerCount);
        ids.cta.textContent = state.isHost ? 'Launch' : 'Ready';
        ids.cta.disabled = state.playerCount < 2;
        updateStatus();

        ids.devPlayers.value = String(state.playerCount);
        ids.devHost.checked = state.isHost;
        ids.devSession.value = state.session;
        ids.devMap.value = String(state.mapIndex);
        ids.devMode.value = String(state.modeIndex);

        ids.mapGrid.querySelectorAll('.map-item').forEach(function (item) {
          const idx = Number(item.getAttribute('data-map'));
          item.classList.toggle('active', idx === state.mapIndex);
        });
      }

      function openModal() { ids.modal.classList.add('open'); ids.modal.setAttribute('aria-hidden', 'false'); }
      function closeModal() { ids.modal.classList.remove('open'); ids.modal.setAttribute('aria-hidden', 'true'); }

      function bind() {
        window.addEventListener('resize', scaleStage);
        document.getElementById('open-map').addEventListener('click', openModal);
        document.getElementById('close-modal').addEventListener('click', closeModal);
        ids.modal.addEventListener('click', function (e) { if (e.target === ids.modal) closeModal(); });

        document.getElementById('copy-btn').addEventListener('click', function () {
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(state.roomCode);
          log('CopyRoomCode', state.roomCode);
        });
        document.getElementById('cycle-mode').addEventListener('click', function () { state.modeIndex = (state.modeIndex + 1) % modes.length; renderAll(); log('ModeCycle', modes[state.modeIndex]); });
        ids.sessionLocal.addEventListener('click', function () { state.session = 'local'; state.ready = false; renderAll(); log('SessionChange', 'local'); });
        ids.sessionOnline.addEventListener('click', function () { state.session = 'online'; state.ready = false; renderAll(); log('SessionChange', 'online'); });

        ids.cta.addEventListener('click', function () {
          if (state.playerCount < 2) return;
          if (state.isHost) log('Launch', 'Host launched preview');
          else { state.ready = !state.ready; renderAll(); log('ReadyToggle', String(state.ready)); }
        });

        ids.devPlayers.addEventListener('input', function () { state.playerCount = Number(ids.devPlayers.value); if (state.playerCount < 2) state.ready = false; renderAll(); log('DevPlayers', String(state.playerCount)); });
        ids.devHost.addEventListener('change', function () { state.isHost = ids.devHost.checked; state.ready = false; renderAll(); log('DevHost', String(state.isHost)); });
        ids.devSession.addEventListener('change', function () { state.session = ids.devSession.value; state.ready = false; renderAll(); log('DevSession', state.session); });
        ids.devMap.addEventListener('change', function () { state.mapIndex = Number(ids.devMap.value); renderAll(); log('DevMap', maps[state.mapIndex].name); });
        ids.devMode.addEventListener('change', function () { state.modeIndex = Number(ids.devMode.value); renderAll(); log('DevMode', modes[state.modeIndex]); });
      }

      function initDevOptions() {
        maps.forEach(function (m, i) { const opt = document.createElement('option'); opt.value = String(i); opt.textContent = m.name; ids.devMap.appendChild(opt); });
        modes.forEach(function (m, i) { const opt = document.createElement('option'); opt.value = String(i); opt.textContent = m; ids.devMode.appendChild(opt); });
      }

      initDevOptions();
      buildMapModal();
      bind();
      scaleStage();
      renderAll();
      log('Init', 'Scratch variant 1 ready');
    })();
  </script>
</body>
</html>
