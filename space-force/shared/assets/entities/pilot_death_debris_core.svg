<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6 -6 12 12" role="img" aria-label="Pilot death debris core">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0" stop-color="var(--slot-primary, #00f0ff)" stop-opacity="1"/>
      <stop offset="1" stop-color="var(--slot-primary, #00f0ff)" stop-opacity="0.58"/>
    </radialGradient>
  </defs>

  <g id="visual">
    <polygon
      points="0,-2.9 2.8,0 0,2.9 -3.0,0"
      fill="url(#coreGlow)"
      stroke="var(--slot-stroke, #e9fcff)"
      stroke-width="0.8"
      stroke-linejoin="round"
    />
    <polygon
      points="0,-1.8 1.8,0 0,1.8 -1.9,0"
      fill="var(--slot-secondary, #05131d)"
      opacity="0.25"
    />
  </g>

  <path
    id="collider"
    d="M 0 -2.9 L 2.8 0 L 0 2.9 L -3.0 0 Z"
    fill="none"
    stroke="none"
  />
</svg>
