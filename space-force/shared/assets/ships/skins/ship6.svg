<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 40 40" role="img" aria-label="Ship cel shaded variant: Chibi">
  <defs>
    <style>
      .slot-primary { fill: var(--slot-primary, #00f0ff); }
      .o { stroke: var(--slot-stroke, #06141c); stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
      .o3 { stroke: var(--slot-stroke, #06141c); stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }

      .hull { fill: var(--slot-primary, #00f0ff); }
      .shadow {
        fill: #000;
        opacity: 0.22;
      }
      .deep {
        fill: #000;
        opacity: 0.38;
      }
      .wing { fill: var(--slot-primary, #00f0ff); }
      .wingS {
        fill: #000;
        opacity: 0.22;
      }

      .cheek { fill: var(--slot-secondary, #ffffff); opacity: 0.55; }
      .shine { fill: var(--slot-secondary, #ffffff); opacity: 0.9; }
      .glow { fill: var(--slot-primary, #00f0ff); opacity: 0.18; }
    </style>
  </defs>

  <g id="visual" transform="scale(1 0.8) rotate(90) scale(0.35) translate(-0.25 -4.5)">
    <circle cx="0" cy="30" r="27" class="glow"/>

    <!-- wings -->
    <polygon points="-32.9,27.1 -49.9,22.7 -33.6,10.5 -19.2,23.0" data-role="wing-left" class="wing o3"/>
    <polygon points="-33.6,10.5 -49.9,22.7 -33.2,18.0 -21.2,22.0" class="wingS"/>
    <polygon points="36.2,27.1 50.4,23.0 34.3,10.3 19.3,22.4" data-role="wing-right" class="wing o3"/>
    <polygon points="34.3,10.3 50.4,23.0 33.9,18.0 21.8,22.0" class="wingS"/>

    <!-- hull -->
    <polygon points="0,-32 37,3 16,18 -16,18 -37,3" data-role="hull-main" class="hull o"/>
    <polygon points="0,-32 37,3 16,18 0,14" class="shadow"/>
    <polygon points="0,-32 -37,3 -16,18 0,14" class="deep"/>

    <!-- cute cockpit "face" -->
    <polygon points="0,-24 15,-11 0,-7 -15,-11" fill="#06141c" opacity="0.96"/>
    <!-- eye shine -->
    <polygon points="-7,-12 -2,-14 -1,-11 -6,-10" class="shine"/>
    <polygon points="7,-12 2,-14 1,-11 6,-10" class="shine"/>
    <!-- cheeks -->
    <polygon points="-13,-10 -8,-12 -7,-9 -12,-8" class="cheek"/>
    <polygon points="13,-10 8,-12 7,-9 12,-8" class="cheek"/>

    <!-- top shine -->
    <path d="M -16 -14 L 0 -28 L 16 -14 L 12 -10 L 0 -20 L -12 -10 Z" fill="var(--slot-secondary, #ffffff)" opacity="0.95"/>

    <!-- engine -->
    <polygon points="0,34 13,24 0,14 -13,24" class="slot-primary o3" opacity="0.82"/>
    <polygon points="0,31 9,24 0,17 -9,24" fill="var(--slot-secondary, #ffffff)" opacity="0.82"/>
    <!-- little heart flame -->
    <path d="M 0 35 C -4 33 -3 28 0 29 C 3 28 4 33 0 35 Z" fill="var(--slot-secondary, #ffffff)" opacity="0.9"/>
  </g>

  <path id="collider"
    d="M 12.775 -0.07 L 0.525 10.29 L -6.475 14.042 L -10.325 -0.07 L -6.37 -14.042 L 0.525 -10.43 Z"
    fill="none" stroke="none"/>
</svg>
