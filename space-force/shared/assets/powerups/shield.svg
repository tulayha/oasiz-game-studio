<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 24 24" role="img" aria-label="Shield powerup">
  <defs>
    <style>
      .slot-box { fill: var(--slot-box, #00ccff); }
      .slot-icon { fill: var(--slot-icon, #ffffff); }
      .slot-accent { fill: var(--slot-accent, #9cf1ff); }
      .slot-stroke { stroke: var(--slot-stroke, #ffffff); }
    </style>
  </defs>
  <rect class="slot-box slot-stroke" x="-10" y="-10" width="20" height="20" rx="2.4" ry="2.4" stroke-width="1.8" />
  <circle class="slot-icon" cx="0" cy="0" r="5.8"/>
  <circle class="slot-accent" cx="0" cy="0" r="3.2"/>
</svg>
