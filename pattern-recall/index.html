<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes">
    <title>Pattern Recall</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden; touch-action: none;
            font-family: 'Orbitron', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background: #0a0a1a;
        }
        .hidden { display: none !important; }
        #app { position: relative; width: 100%; height: 100%; background: #0a0a1a; }
        #game-container { width: 100%; height: 100%; }

        /* ===== MAIN MENU ===== */
        #main-menu {
            position: absolute; top: 0; right: 0; bottom: 0; left: 0; z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, #0d1b2a 0%, #0a0a1a 70%);
            transition: opacity 600ms ease, visibility 600ms ease;
        }
        #main-menu.menu-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .menu-title-wrap { margin-bottom: 4rem; text-align: center; }
        .menu-title {
            font-size: 2.8rem; font-weight: 900; line-height: 1.15;
            background: linear-gradient(135deg, #00f0ff, #7b2fff, #ff2d95);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.08em;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        @media (min-width: 768px) { .menu-title { font-size: 4.5rem; } }
        .menu-subtitle {
            font-size: 0.65rem; color: #4a6fa5; letter-spacing: 0.5em;
            margin-top: 1rem;
            animation: pulse 2.5s ease-in-out infinite;
        }
        @media (min-width: 768px) { .menu-subtitle { font-size: 0.8rem; } }

        .menu-instructions {
            max-width: 320px; text-align: center; margin-bottom: 3rem;
            color: #5a7fa5; font-size: 0.55rem; line-height: 1.8; letter-spacing: 0.1em;
        }
        @media (min-width: 768px) { .menu-instructions { font-size: 0.65rem; max-width: 400px; } }

        /* ===== PLAY BUTTON ===== */
        #play-btn {
            position: relative; padding: 1.1rem 3.5rem;
            background: linear-gradient(135deg, #00f0ff, #7b2fff);
            color: #fff; font-family: 'Orbitron', sans-serif; font-weight: 700;
            font-size: 1.1rem; letter-spacing: 0.15em;
            border: none; border-radius: 50px; cursor: pointer;
            transition: all 200ms ease;
        }
        #play-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        #play-btn:active { transform: scale(0.97); }

        /* ===== SETTINGS GEAR ===== */
        #settings-btn {
            position: absolute; top: 45px; right: 20px; z-index: 60;
            width: 48px; height: 48px;
            background: rgba(10, 10, 26, 0.7); color: #00f0ff;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 12px;
            cursor: pointer; transition: all 150ms ease;
        }
        #settings-btn:hover { background: rgba(0, 240, 255, 0.1); border-color: #00f0ff; }
        @media (pointer: coarse) { #settings-btn { top: 120px; } }
        #settings-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* ===== HUD ===== */
        #hud {
            position: absolute; top: 45px; left: 20px; z-index: 30;
            display: flex; gap: 24px; pointer-events: none;
        }
        @media (pointer: coarse) { #hud { top: 120px; } }
        .hud-item { display: flex; flex-direction: column; align-items: flex-start; }
        .hud-label { font-size: 0.5rem; color: #4a6fa5; letter-spacing: 0.2em; margin-bottom: 4px; }
        .hud-value { font-size: 1.3rem; font-weight: 700; color: #00f0ff; }
        @media (min-width: 768px) { .hud-value { font-size: 1.5rem; } }

        /* ===== ROUND BANNER ===== */
        #round-banner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 35; pointer-events: none;
            font-size: 2rem; font-weight: 900; letter-spacing: 0.15em;
            color: #00f0ff; opacity: 0;
            text-align: center;
        }
        @media (min-width: 768px) { #round-banner { font-size: 3rem; } }

        /* ===== MODAL OVERLAY ===== */
        .modal-overlay {
            position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            background: rgba(5, 5, 15, 0.92);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        #game-over-modal { z-index: 40; }
        #settings-modal { z-index: 50; }

        /* ===== MODAL CARD ===== */
        .modal-card {
            width: 90%; max-width: 360px;
            background: linear-gradient(180deg, #0d1b2a 0%, #0a0a1a 100%);
            padding: 2rem 1.5rem;
            border: 2px solid rgba(0, 240, 255, 0.2); border-radius: 16px;
        }

        /* ===== GAME OVER ===== */
        .go-header { margin-bottom: 1.5rem; text-align: center; }
        .go-header h1 {
            font-size: 1.5rem; font-weight: 900; letter-spacing: 0.1em;
            background: linear-gradient(135deg, #ff2d95, #ff6b35);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @media (min-width: 768px) { .go-header h1 { font-size: 2rem; } }
        .go-divider {
            height: 2px; width: 80%; margin: 0.75rem auto 0;
            background: linear-gradient(90deg, transparent, rgba(255, 45, 149, 0.5), transparent);
        }
        .go-scores { text-align: center; margin: 1.5rem 0 2rem; }
        .go-scores .label { color: #4a6fa5; font-size: 0.5rem; letter-spacing: 0.3em; margin-bottom: 0.75rem; }
        #final-score {
            font-size: 3rem; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #00f0ff, #7b2fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .go-round { margin-top: 0.5rem; }
        .go-round .label { margin-bottom: 0.25rem; }
        #final-round { font-size: 1.2rem; font-weight: 700; color: #7b2fff; }

        /* ===== MODAL BUTTONS ===== */
        .modal-buttons { display: flex; flex-direction: column; gap: 0.75rem; }
        .modal-btn {
            width: 100%; padding: 0.9rem;
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            font-size: 0.7rem; letter-spacing: 0.15em;
            border: none; border-radius: 12px; cursor: pointer;
            transition: all 150ms ease;
        }
        #restart-btn {
            background: linear-gradient(135deg, #00f0ff, #7b2fff);
            color: #fff;
        }
        #restart-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        #restart-btn:active { transform: translateY(1px); }
        #go-settings-btn {
            background: rgba(30, 50, 80, 0.6); color: #4a6fa5;
            border: 2px solid rgba(74, 111, 165, 0.3);
        }
        #go-settings-btn:hover { background: rgba(30, 50, 80, 0.9); color: #7b9fc5; }

        /* ===== SETTINGS MODAL ===== */
        .settings-header { margin-bottom: 1.5rem; text-align: center; }
        .settings-header h2 {
            font-size: 1rem; font-weight: 700; color: #00f0ff; letter-spacing: 0.15em;
        }
        .settings-divider {
            height: 2px; width: 60px; margin: 0.75rem auto 0;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
        }
        .settings-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .settings-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 1rem;
            background: rgba(13, 27, 42, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.1); border-radius: 10px;
        }
        .settings-row-left { display: flex; align-items: center; gap: 0.75rem; }
        .settings-row-left svg { width: 20px; height: 20px; fill: #00f0ff; }
        .setting-label { font-size: 0.55rem; color: #8ab4d8; letter-spacing: 0.1em; }

        /* ===== TOGGLE ===== */
        .neon-toggle {
            width: 52px; height: 28px;
            background: rgba(30, 50, 80, 0.6); border: 2px solid rgba(74, 111, 165, 0.3);
            border-radius: 14px; cursor: pointer; position: relative;
            transition: all 250ms ease;
        }
        .neon-toggle.active { background: rgba(0, 240, 255, 0.15); border-color: #00f0ff; }
        .neon-toggle .toggle-knob {
            width: 20px; height: 20px;
            background: #4a6fa5; border-radius: 50%;
            position: absolute; top: 2px; left: 3px;
            transition: all 250ms ease;
        }
        .neon-toggle.active .toggle-knob { left: calc(100% - 23px); background: #00f0ff; }

        /* ===== CLOSE BUTTON ===== */
        .settings-close-wrap { margin-top: 1.5rem; }
        #close-settings {
            width: 100%; padding: 0.75rem;
            background: rgba(30, 50, 80, 0.6); color: #4a6fa5;
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            font-size: 0.6rem; letter-spacing: 0.15em;
            border: 2px solid rgba(74, 111, 165, 0.3); border-radius: 12px;
            cursor: pointer; transition: all 150ms ease;
        }
        #close-settings:hover { background: rgba(30, 50, 80, 0.9); color: #7b9fc5; }

        /* ===== ANIMATIONS ===== */
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.3)); }
            100% { filter: drop-shadow(0 0 40px rgba(123, 47, 255, 0.4)); }
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="app">
        <div id="game-container"></div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-item">
                <span class="hud-label">SCORE</span>
                <span class="hud-value" id="hud-score">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">ROUND</span>
                <span class="hud-value" id="hud-round">1</span>
            </div>
        </div>

        <!-- ROUND BANNER -->
        <div id="round-banner"></div>

        <!-- MAIN MENU -->
        <div id="main-menu">
            <div class="menu-title-wrap">
                <h1 class="menu-title">PATTERN<br>RECALL</h1>
                <p class="menu-subtitle">MEMORY CHALLENGE</p>
            </div>
            <div class="menu-instructions">
                WATCH THE SEQUENCE. TAP THE TILES IN THE SAME ORDER. EACH ROUND ADDS ONE MORE STEP.
            </div>
            <button id="play-btn">START</button>
        </div>

        <!-- SETTINGS BUTTON -->
        <button id="settings-btn" class="hidden">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
        </button>

        <!-- GAME OVER MODAL -->
        <div id="game-over-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <div class="go-header">
                    <h1>GAME OVER</h1>
                    <div class="go-divider"></div>
                </div>
                <div class="go-scores">
                    <p class="label">FINAL SCORE</p>
                    <p id="final-score">0</p>
                    <div class="go-round">
                        <p class="label">ROUND REACHED</p>
                        <p id="final-round">1</p>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button id="restart-btn" class="modal-btn">PLAY AGAIN</button>
                    <button id="go-settings-btn" class="modal-btn">SETTINGS</button>
                </div>
            </div>
        </div>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <div class="settings-header">
                    <h2>SETTINGS</h2>
                    <div class="settings-divider"></div>
                </div>
                <div class="settings-list">
                    <div class="settings-row">
                        <div class="settings-row-left">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                            <span class="setting-label">MUSIC</span>
                        </div>
                        <div class="neon-toggle active" id="music-toggle">
                            <div class="toggle-knob"></div>
                        </div>
                    </div>
                    <div class="settings-row">
                        <div class="settings-row-left">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                            <span class="setting-label">SOUND FX</span>
                        </div>
                        <div class="neon-toggle active" id="fx-toggle">
                            <div class="toggle-knob"></div>
                        </div>
                    </div>
                    <div class="settings-row">
                        <div class="settings-row-left">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M0 15h2V9H0v6zm3 2h2V7H3v10zm19-8v6h2V9h-2zm-3 8h2V7h-2v10zM16.5 3h-9C6.67 3 6 3.67 6 4.5v15c0 .83.67 1.5 1.5 1.5h9c.83 0 1.5-.67 1.5-1.5v-15c0-.83-.67-1.5-1.5-1.5zM16 19H8V5h8v14z"/></svg>
                            <span class="setting-label">HAPTICS</span>
                        </div>
                        <div class="neon-toggle active" id="haptics-toggle">
                            <div class="toggle-knob"></div>
                        </div>
                    </div>
                </div>
                <div class="settings-close-wrap">
                    <button id="close-settings">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.platform = {
            musicEnabled: localStorage.getItem('musicEnabled') !== 'false',
            fxEnabled: localStorage.getItem('fxEnabled') !== 'false',
            hapticsEnabled: localStorage.getItem('hapticsEnabled') !== 'false',
        };

        var settingsBtn = document.getElementById('settings-btn');
        var settingsModal = document.getElementById('settings-modal');
        var closeSettingsBtn = document.getElementById('close-settings');
        var gameOverModal = document.getElementById('game-over-modal');
        var finalScoreEl = document.getElementById('final-score');
        var finalRoundEl = document.getElementById('final-round');
        var restartBtn = document.getElementById('restart-btn');
        var goSettingsBtn = document.getElementById('go-settings-btn');
        var mainMenu = document.getElementById('main-menu');
        var playBtn = document.getElementById('play-btn');
        var musicToggle = document.getElementById('music-toggle');
        var fxToggle = document.getElementById('fx-toggle');
        var hapticsToggle = document.getElementById('haptics-toggle');

        function setToggleState(el, active) {
            if (active) { el.classList.add('active'); }
            else { el.classList.remove('active'); }
        }
        setToggleState(musicToggle, window.platform.musicEnabled);
        setToggleState(fxToggle, window.platform.fxEnabled);
        setToggleState(hapticsToggle, window.platform.hapticsEnabled);

        musicToggle.onclick = function() {
            var enabled = !window.platform.musicEnabled;
            window.platform.musicEnabled = enabled;
            localStorage.setItem('musicEnabled', enabled.toString());
            setToggleState(musicToggle, enabled);
            if (window.toggleMusic) window.toggleMusic(enabled);
            if (typeof window.triggerHaptic === 'function') window.triggerHaptic('light');
        };
        fxToggle.onclick = function() {
            var enabled = !window.platform.fxEnabled;
            window.platform.fxEnabled = enabled;
            localStorage.setItem('fxEnabled', enabled.toString());
            setToggleState(fxToggle, enabled);
            if (typeof window.triggerHaptic === 'function') window.triggerHaptic('light');
        };
        hapticsToggle.onclick = function() {
            var enabled = !window.platform.hapticsEnabled;
            window.platform.hapticsEnabled = enabled;
            localStorage.setItem('hapticsEnabled', enabled.toString());
            setToggleState(hapticsToggle, enabled);
            if (typeof window.triggerHaptic === 'function') window.triggerHaptic('light');
        };

        function openSettings() {
            settingsModal.classList.remove('hidden');
            if (typeof window.triggerHaptic === 'function') window.triggerHaptic('light');
            if (window.pauseGame) window.pauseGame();
        }
        function closeSettingsFn() {
            settingsModal.classList.add('hidden');
            if (typeof window.triggerHaptic === 'function') window.triggerHaptic('light');
            if (window.resumeGame) window.resumeGame();
        }
        settingsBtn.onclick = openSettings;
        closeSettingsBtn.onclick = closeSettingsFn;
        goSettingsBtn.onclick = openSettings;

        restartBtn.onclick = function() {
            if (typeof window.triggerHaptic === 'function') window.triggerHaptic('medium');
            gameOverModal.classList.add('hidden');
            if (window.restartGame) window.restartGame();
        };

        playBtn.onclick = function() {
            if (typeof window.triggerHaptic === 'function') window.triggerHaptic('medium');
            if (window.startGame) window.startGame();
            mainMenu.classList.add('menu-hidden');
            document.getElementById('settings-btn').classList.remove('hidden');
            document.getElementById('hud').classList.remove('hidden');
        };

        window.showGameOver = function(score, round) {
            finalScoreEl.textContent = score;
            finalRoundEl.textContent = round;
            gameOverModal.classList.remove('hidden');
            document.getElementById('settings-btn').classList.add('hidden');
            document.getElementById('hud').classList.add('hidden');
        };

        window.showMainMenu = function() {
            mainMenu.classList.remove('menu-hidden');
            gameOverModal.classList.add('hidden');
            document.getElementById('settings-btn').classList.add('hidden');
            document.getElementById('hud').classList.add('hidden');
        };

        if (typeof window.submitScore !== 'function') {
            window.submitScore = function(score) { console.log("[Game] Submitting score:", score); };
        }
        if (typeof window.triggerHaptic !== 'function') {
            window.triggerHaptic = function(type) {
                if (!window.platform.hapticsEnabled) return;
                if (navigator.vibrate) navigator.vibrate(10);
            };
        }
    </script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
